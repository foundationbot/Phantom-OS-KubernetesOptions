apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Per-robot pin for the dma-ethercat image. Bump newTag to roll a
# different ethercat .deb to mk11-class robots; the .deb baked into
# the image at /usr/local/share/dma/deb/ is what bootstrap-robot.sh
# dpkg -i's on the host.
resources:
  - ../../base
images:
  - name: foundationbot/dma-ethercat
    newTag: main-latest-aarch64
