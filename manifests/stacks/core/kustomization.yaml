apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Core stack — workloads required for the robot to function.
# Touches local hardware (cameras, GPU, registry mirror) so this set
# always runs on the robot. The `core` entry under stacks: in
# /etc/phantomos/host-config.yaml is non-optional; bootstrap rejects
# attempts to disable it.
#
# Image tag and dev-mount overrides come from the host's
# /etc/phantomos/host-config.yaml at bringup; bootstrap injects them
# into the live phantomos-<robot>-core Argo Application's
# spec.source.kustomize.{images,patches}. Nothing per-host lives here.
# Labels go onto every resource's metadata, but NOT into selectors.
# Selectors on existing Deployments / StatefulSets are immutable; using
# `commonLabels` (or labels with includeSelectors: true) would block the
# umbrella -> per-stack migration.
labels:
  - pairs:
      app.kubernetes.io/part-of: phantomos
      phantomos.foundation.bot/stack: core
    includeSelectors: false
resources:
  - ../../base/runtime-classes
  - ../../base/registry
  - ../../base/dma-video
  - ../../base/positronic
  - ../../base/phantomos-api-server
  - ../../base/yovariable-server
