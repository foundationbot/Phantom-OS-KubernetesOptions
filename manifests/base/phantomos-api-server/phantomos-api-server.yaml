# phantomos-api-server — DaemonSet for in-cluster deployment on a robot node.
#
# Strategy A: bind-mount the host's /sys and /proc directly over the
# container's own paths, so the codebase's hardcoded `/sys/class/thermal`,
# `/sys/class/net`, `/proc/net/route` etc. read host data unchanged. No
# code changes needed. Trade-off: the container's own /proc and /sys are
# shadowed — fine for this image (Ubuntu base, no internal sysfs reads
# beyond what the server itself does).
#
# This pod is a node-agent: it must run *on the robot*, not on a generic
# worker node. Pin via nodeSelector/tolerations below.
#
# Source of truth lives in
# ApiServer/native-ai-api-server/deploy/kubernetes/phantomos-api-server.yaml.
# Keep this file in
# sync with that source when the upstream manifest changes; robot
# overlays in manifests/robots/<name>/ pull this in via kustomize.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: phantomos-api-server
  namespace: phantom
  labels:
    app.kubernetes.io/name: phantomos-api-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: phantomos-api-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: phantomos-api-server
    spec:
      # ── Pin to robot node(s). Pick whichever selector your cluster
      # already uses to identify robots. Examples:
      #
      #   nodeSelector:
      #     foundation.bot/robot: "true"
      #
      #   nodeSelector:
      #     kubernetes.io/hostname: hw-thor01
      #
      # If robots are tainted (typical for dedicated hardware nodes),
      # add a matching toleration.
      nodeSelector:
        foundation.bot/robot: "true"
      tolerations:
        - operator: Exists
          effect: NoSchedule

      # Cluster-native networking. The pod gets a normal cluster IP;
      # other pods reach it via the phantomos-api-server Service in
      # this namespace. External access (operator's PC / browser)
      # still works through the hostPort:5000 declared on the
      # container — kubelet's portmap CNI plugin sets up DNAT from
      # node:5000 to the pod IP.
      #
      # Trade-off: any endpoint that reads network state out of
      # /proc/net/* now reflects the POD's net namespace, not the
      # host's. The api server must either:
      #   (a) read /proc/1/net/route (host PID 1 stays in host net ns
      #       because hostPID is still true), or
      #   (b) invoke the read via HOST_EXEC_PREFIX (nsenter -t 1 -a),
      #       which already brings net+pid+mount namespaces along.
      # The internet-reachability probe (TCP 8.8.8.8:53) likewise
      # must run under HOST_EXEC_PREFIX to test the robot's uplink
      # rather than the pod's CNI bridge.
      hostNetwork: false
      # Required so `nsenter -t 1 -a` can reach host PID 1.
      hostPID: true

      # Host-level singleton — no point starting a second copy.
      terminationGracePeriodSeconds: 15

      # foundationbot/phantomos-api-server is a private DockerHub repo;
      # the pull needs the deployment-account PAT. Per the convention
      # used in dma-video, the Secret is created out-of-band in each
      # namespace (see REQUIREMENTS.md) and pods reference it here.
      imagePullSecrets:
        - name: dockerhub-creds

      # Models are loaded the same way positronic-control loads them:
      # a busybox-style image (foundationbot/phantom-models) ships the
      # /models tree, the load-models init container copies it into a
      # shared emptyDir, and the api container mounts it read-only at
      # /home/operator/models. The image tag is rewritten per-host via
      # the same kustomize.images injection that handles positronic.
      #
      # The load-models initContainer is OPTIONAL. When the
      # localhost:5443/phantom-models image isn't available, leave it
      # commented out — the api container's /home/operator/models
      # mount becomes an empty emptyDir, and endpoints that read from
      # PHANTOM_MODELS will return empty / error. To re-enable, build
      # and push the phantom-models image to the local registry, set
      # `images.phantom-models.image` in host-config.yaml to that tag,
      # and uncomment the block below.
      #
      # initContainers:
      #   - name: load-models
      #     image: localhost:5443/phantom-models:PLACEHOLDER
      #     imagePullPolicy: IfNotPresent
      #     command:
      #       - sh
      #       - -c
      #       - |
      #         set -eu
      #         echo "==> copying /models -> /shared"
      #         cp -a /models/. /shared/
      #         echo "==> done"
      #         ls -la /shared | head
      #     volumeMounts:
      #       - name: phantom-models
      #         mountPath: /shared
      #     resources:
      #       requests: { cpu: "100m", memory: "64Mi" }
      #       limits:   { cpu: "500m", memory: "256Mi" }

      containers:
        - name: api
          # CircleCI publishes this image to DockerHub on every push to
          # the default branch as foundationbot/phantomos-api-server:V-<ver>-<ts>
          # (and also retags :latest). Bump this tag when a new build needs to roll.
          image: foundationbot/phantomos-api-server:V-1-0-1-20260430-001713
          imagePullPolicy: IfNotPresent

          ports:
            # containerPort only — no hostPort. Single entry point
            # into this service is the phantomos-api-server Service
            # in this namespace. External clients (operator's PC,
            # browser) reach it through argus-nginx (NodePort 30080
            # in the argus ns), which proxies /api/control/ -> this
            # Service. Anything pod-side uses cluster DNS directly.
            #
            # Why not hostPort:5000 too? It creates a second,
            # node-pinned path (node:5000 -> pod) that bypasses the
            # Service, breaks under multi-replica, and silently
            # diverges from the proxied path during debugging.
            # If you need raw :5000 for a one-off probe, use
            #   kubectl -n phantom port-forward svc/phantomos-api-server 5000:5000
            # — same on-the-wire result, no manifest carrying a
            # second routing concept it doesn't need.
            - name: http
              containerPort: 5000

          env:
            - name: API_HOST
              value: "0.0.0.0"
            - name: API_PORT
              value: "5000"
            - name: LOG_LEVEL
              value: "INFO"
            # The single most important knob: wraps every systemctl /
            # journalctl / reboot / nvidia-smi invocation with `nsenter`
            # so it runs in host PID 1's namespace. Without this, the
            # container queries the (empty) container-local systemd and
            # every service-status endpoint reports "inactive".
            - name: HOST_EXEC_PREFIX
              value: "nsenter -t 1 -a"
            # PHANTOM_MODELS points at the emptyDir populated by the
            # load-models init container (image source-of-truth). The
            # operator-ui compose project and phantom-scripts paths
            # are no longer mounted by default — they were /home/<dev>
            # paths that don't exist on production robots. If a host
            # legitimately needs them, declare under
            # /etc/phantomos/host-config.yaml's
            # deployments.phantomos-api-server.mounts list and
            # bootstrap will inject them via kustomize.patches.
            - name: PHANTOM_MODELS
              value: /home/operator/models
            # Override these in host-config.yaml as ConfigMap fields if
            # you have on-disk compose project trees to expose:
            # - name: OPERATOR_UI_COMPOSE_PATH
            #   value: /home/operator/repos/argus/operator_ui
            # - name: PHANTOM_SCRIPT_DIRECTORY
            #   value: /home/operator/scripts

          securityContext:
            # nsenter into PID 1 needs CAP_SYS_ADMIN + CAP_SYS_PTRACE.
            # `privileged: true` is the blanket option and is what most
            # node-agent DaemonSets use. If your cluster's PSP/PSA
            # forbids privileged pods, switch to the narrower form:
            #
            #   privileged: false
            #   capabilities:
            #     add: ["SYS_ADMIN", "SYS_PTRACE", "NET_ADMIN", "NET_RAW"]
            #
            # Note: /system/reboot needs SYS_BOOT in addition.
            privileged: true
            runAsUser: 0

          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 256Mi

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 2
            periodSeconds: 10

          volumeMounts:
            # ── Strategy A: replace the container's /sys and /proc with
            # the host's. mountPropagation: HostToContainer so mounts
            # done on the host AFTER the pod starts (e.g. a USB device
            # appearing under /sys) propagate in.
            - name: host-sys
              mountPath: /sys
              mountPropagation: HostToContainer
              readOnly: true
            - name: host-proc
              mountPath: /proc
              mountPropagation: HostToContainer
            # ── Docker daemon socket — required by every /docker/* and
            # /docker-compose/* endpoint. The container ships the docker
            # CLI; this gives it a daemon to talk to.
            - name: docker-sock
              mountPath: /var/run/docker.sock
            # ── Shared memory for DMA EtherCAT freshness check.
            # internal/ethercat/CheckSHM stat()s /dev/shm/actuals.
            - name: dev-shm
              mountPath: /dev/shm
            # ── USB device tree — required by `lsusb` (joystick status)
            # and `adb`. /sys is already covered above; this adds the
            # device nodes lsusb needs to read.
            - name: dev
              mountPath: /dev
              mountPropagation: HostToContainer
            # ── Models tree, populated by the load-models init
            # container from the foundationbot/phantom-models image.
            - name: phantom-models
              mountPath: /home/operator/models
              readOnly: true
            # Per-host hostPath mounts (operator-ui compose tree,
            # phantom scripts, etc.) come from /etc/phantomos/host-
            # config.yaml's deployments.phantomos-api-server.mounts
            # list at bootstrap time as a strategic-merge patch on the
            # phantomos-<robot>-core Application. None are baked here.

      volumes:
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: dev-shm
          hostPath:
            path: /dev/shm
            type: Directory
        - name: dev
          hostPath:
            path: /dev
            type: Directory
        # Models — emptyDir populated by the load-models initContainer
        # from the registry-pinned foundationbot/phantom-models image.
        # Same pattern as positronic-control. Tag flows through the
        # host-config images: list (the same localhost:5443/phantom-
        # models entry that handles positronic).
        - name: phantom-models
          emptyDir: {}
---
# In-cluster Service so other pods (notably argus-nginx in the argus
# namespace) can reach phantomos-api-server via stable DNS rather than
# templating the node's external IP into config. The pod is
# hostNetwork, so kubelet populates Endpoints with the node IP; kube-
# proxy then routes Service traffic to <node-ip>:5000 where the pod is
# actually bound. The DaemonSet keeps it node-local; the Service makes
# it pod-addressable.
#
# Browser traffic still goes the other way (operator's tablet
# -> robot:30080 -> argus-nginx -> THIS Service -> node:5000),
# so the Service replaces the per-host IP indirection cleanly.
apiVersion: v1
kind: Service
metadata:
  name: phantomos-api-server
  namespace: phantom
  labels:
    app.kubernetes.io/name: phantomos-api-server
spec:
  selector:
    app.kubernetes.io/name: phantomos-api-server
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
