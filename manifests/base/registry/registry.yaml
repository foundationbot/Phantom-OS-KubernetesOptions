# Local container registry + pull-through cache for DockerHub.
#
# See docs/plans/2026-04-24-local-registry-with-fallback.md for the full
# design. Summary:
#   - host-network pod on :5443, reachable as http://localhost:5443 from
#     both docker (push) and k0s's containerd (pull). Port 5443 (not the
#     registry default 5000) because phantom-control-api.service holds
#     :5000 on this robot.
#   - REGISTRY_PROXY_REMOTEURL makes this a pull-through cache for
#     registry-1.docker.io — first pull is a miss (hits upstream, caches),
#     subsequent pulls are hits
#   - DockerHub creds come from Secret dockerhub-proxy-creds, created
#     manually per cluster (not in git). Without it, the proxy still works
#     for public images; private foundationbot/* images will 401 and
#     containerd falls through to registry-1.docker.io directly.
#
# Bootstrap:
#   kubectl create secret generic dockerhub-proxy-creds \
#     --namespace registry \
#     --from-literal=username=YOUR_DOCKERHUB_USERNAME \
#     --from-literal=password=YOUR_DOCKERHUB_TOKEN

apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-registry-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /var/lib/registry
    type: DirectoryOrCreate
  claimRef:
    namespace: registry
    name: local-registry-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-registry-pvc
  namespace: registry
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-registry
  namespace: registry
spec:
  replicas: 1
  strategy:
    type: Recreate          # hostPath PV is RWO + hostNetwork :5443 — no rolling overlap
  selector:
    matchLabels:
      app: local-registry
  template:
    metadata:
      labels:
        app: local-registry
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: registry
          image: registry:2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5443
              hostPort: 5443
              hostIP: 127.0.0.1
          env:
            # Bind loopback only. With hostNetwork: true the pod shares the
            # host's network stack, so 127.0.0.1:5443 is reachable from
            # docker (push) and containerd (pull) on the same host but NOT
            # from off-host. This blocks anyone who can route to the robot
            # on :5443 from using the proxy creds for free DockerHub access.
            - name: REGISTRY_HTTP_ADDR
              value: "127.0.0.1:5443"
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
            - name: REGISTRY_PROXY_REMOTEURL
              value: https://registry-1.docker.io
            - name: REGISTRY_PROXY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dockerhub-proxy-creds
                  key: username
                  optional: true
            - name: REGISTRY_PROXY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dockerhub-proxy-creds
                  key: password
                  optional: true
          volumeMounts:
            - name: storage
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5443
              # Registry binds 127.0.0.1 only (see REGISTRY_HTTP_ADDR
              # above). With hostNetwork: true, kubelet's default probe
              # host is the pod IP = node IP, which the registry isn't
              # listening on. Override to loopback so the probe actually
              # reaches the registry.
              host: 127.0.0.1
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v2/
              port: 5443
              host: 127.0.0.1
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: local-registry-pvc
