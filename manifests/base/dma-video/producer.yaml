apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: dma-video
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        foundation.bot/has-cameras: "true"
      containers:
        - name: producer
          image: foundationbot/dma-video:main
          imagePullPolicy: IfNotPresent
          # Compose: command: ["--fps", "25", "--camera-config", "/opt/configs/cameras.json"]
          # No entrypoint override → image ENTRYPOINT runs, these are CMD args
          args:
            - "--fps"
            - "15"
            - "--camera-config"
            - "/opt/configs/cameras.json"
          securityContext:
            privileged: true      # required for USB camera access
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: usb
              mountPath: /dev/bus/usb
            - name: cameras-config
              mountPath: /opt/configs/cameras.json
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      volumes:
        - name: shm
          hostPath:
            path: /dev/shm
            type: Directory
        - name: usb
          hostPath:
            path: /dev/bus/usb
            type: Directory
        # Per-robot OAK config (MXIDs + socket map + intrinsics) lives
        # on the host at /etc/phantom/head_camera.json — the
        # phantom-jetson convention this fleet already uses. ArgoCD
        # does NOT reconcile it. hostPath type: FileOrCreate lets the
        # pod schedule even when the file is absent (the producer
        # auto-detects / runs without it) — an empty file is created
        # rather than blocking the whole camera stack on a missing
        # per-host config.
        - name: cameras-config
          hostPath:
            path: /etc/phantom/head_camera.json
            type: FileOrCreate
