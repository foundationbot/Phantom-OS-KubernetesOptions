apiVersion: apps/v1
kind: Deployment
metadata:
  name: viewer
  namespace: dma-video
spec:
  replicas: 1
  selector:
    matchLabels:
      app: viewer
  template:
    metadata:
      labels:
        app: viewer
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        foundation.bot/has-cameras: "true"
      initContainers:
        # Block viewer startup until producer has populated the shared
        # /dev/shm queues. Without this gate viewer crashes 0 s after
        # start ("No camera queues found") and Kubernetes shoves it
        # back into CrashLoopBackOff, polluting logs and masking the
        # real upstream problem (producer can't open OAK cameras).
        #
        # The queue contract: producer writes two files per camera
        # under /dev/shm — video_meta_cam<queue_id> (metadata ring)
        # and video_frames_cam<queue_id> (frame pool), queue_id 0-5
        # per cameras-config. video_viewer.py probes video_meta_cam*
        # to discover cameras (video_viewer.py:637), so presence of
        # any video_meta_cam* file is the gate that matters.
        #
        # We wait indefinitely (no timeout) because producer is on the
        # same node; if producer is gone, viewer staying in Init is
        # the right state to expose. Don't switch to a bounded wait
        # without also bumping `restartPolicy` on the main container.
        - name: wait-for-producer
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              echo "waiting for producer to publish /dev/shm/video_meta_cam* queues..."
              i=0
              until ls /dev/shm/video_meta_cam* >/dev/null 2>&1; do
                i=$((i + 1))
                # Heartbeat every ~30 s so the operator can see we're
                # alive in `kubectl logs ... -c wait-for-producer`.
                if [ $((i % 15)) -eq 0 ]; then
                  echo "  still waiting ($((i * 2))s elapsed). producer pod status:"
                  ls -la /dev/shm/ 2>/dev/null | head -10 || true
                fi
                sleep 2
              done
              echo "producer queues present: $(ls /dev/shm/video_meta_cam* | tr '\n' ' ')"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
              readOnly: true
      containers:
        - name: viewer
          image: foundationbot/dma-video:main
          imagePullPolicy: IfNotPresent
          command: ["python3", "src/video_viewer.py"]
          args: ["--cameras", "0,1,2,3,4,5", "--port", "9299"]
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
      volumes:
        - name: shm
          hostPath:
            path: /dev/shm
            type: Directory
