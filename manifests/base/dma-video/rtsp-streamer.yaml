apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtsp-streamer
  namespace: dma-video
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rtsp-streamer
  template:
    metadata:
      labels:
        app: rtsp-streamer
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        foundation.bot/has-cameras: "true"
      initContainers:
        # Sequence the pipeline: the producer must be up and publishing
        # the /dev/shm camera queues before the streamer starts —
        # otherwise it has no frames to read, crashes 0 s after start,
        # and CrashLoopBackOffs (spamming logs and masking the real
        # upstream issue). Same producer-gate the viewer uses. We wait
        # indefinitely (producer is on the same node); staying in Init is
        # the right state to expose if the producer can't open the OAK.
        - name: wait-for-producer
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              echo "waiting for producer to publish /dev/shm/video_meta_cam* queues..."
              i=0
              until ls /dev/shm/video_meta_cam* >/dev/null 2>&1; do
                i=$((i + 1))
                if [ $((i % 15)) -eq 0 ]; then
                  echo "  still waiting ($((i * 2))s elapsed)"
                fi
                sleep 2
              done
              echo "producer queues present: $(ls /dev/shm/video_meta_cam* | tr '\n' ' ')"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      containers:
        - name: rtsp-streamer
          image: foundationbot/dma-video:main
          imagePullPolicy: IfNotPresent
          command: ["python3", "src/rtsp_streamer.py"]
          args: ["--camera-config", "/opt/configs/cameras.json"]
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: cameras-config
              mountPath: /opt/configs/cameras.json
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      volumes:
        - name: shm
          hostPath:
            path: /dev/shm
            type: Directory
        # Per-robot OAK config from /etc/phantom/head_camera.json —
        # see producer.yaml for full rationale.
        - name: cameras-config
          hostPath:
            path: /etc/phantom/head_camera.json
            type: FileOrCreate
