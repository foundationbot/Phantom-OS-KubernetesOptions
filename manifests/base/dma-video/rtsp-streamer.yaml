apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtsp-streamer
  namespace: dma-video
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rtsp-streamer
  template:
    metadata:
      labels:
        app: rtsp-streamer
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        foundation.bot/has-cameras: "true"
      containers:
        - name: rtsp-streamer
          image: foundationbot/dma-video:main
          imagePullPolicy: IfNotPresent
          command: ["python3", "src/rtsp_streamer.py"]
          args: ["--camera-config", "/opt/configs/cameras.json"]
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: cameras-config
              mountPath: /opt/configs/cameras.json
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      volumes:
        - name: shm
          hostPath:
            path: /dev/shm
            type: Directory
        # Per-robot OAK config from /etc/phantom/head_camera.json —
        # see producer.yaml for full rationale.
        - name: cameras-config
          hostPath:
            path: /etc/phantom/head_camera.json
            type: FileOrCreate
