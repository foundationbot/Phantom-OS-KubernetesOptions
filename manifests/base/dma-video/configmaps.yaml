# Fleet-wide ConfigMaps for the dma-video stack.
#
# NOTE: cameras-config is NOT in this file. Each Deployment in this
# stack (producer, camera-params, rtsp-streamer) mounts the per-robot
# /etc/phantom/head_camera.json directly via hostPath. That file is
# the phantom-jetson convention this fleet already uses (MXIDs,
# socket assignments, intrinsics); ArgoCD does NOT reconcile it.
---
# ConfigMap: mediamtx config (from DMA.video/config/mediamtx.yml)
apiVersion: v1
kind: ConfigMap
metadata:
  name: mediamtx-config
  namespace: dma-video
data:
  mediamtx.yml: |
    # MediaMTX configuration for DMA.video
    logLevel: info

    # RTSP settings
    rtspAddress: :8554
    rtspTransports: [tcp]

    # API settings
    api: yes
    apiAddress: :9997
    apiAllowOrigin: '*'

    # WebRTC settings
    webrtc: yes
    webrtcAddress: :8889
    webrtcAllowOrigin: '*'

    # HLS settings
    hls: yes
    hlsAddress: :8888
    hlsAllowOrigin: '*'

    # Path settings — one per camera
    paths:
      left:
        source: publisher
        rtspTransport: tcp
      right:
        source: publisher
        rtspTransport: tcp
      left_ear:
        source: publisher
        rtspTransport: tcp
      right_ear:
        source: publisher
        rtspTransport: tcp
      top:
        source: publisher
        rtspTransport: tcp
      bottom:
        source: publisher
        rtspTransport: tcp
