# dma-video stack — every Deployment here gates on
# foundation.bot/has-cameras=true via nodeSelector. Robots without
# cameras opt out by setting foundation.bot/has-cameras: 'false' in
# host-config.yaml's nodeLabels: block.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - configmaps.yaml
  - camera-params.yaml
  - mediamtx.yaml
  - producer.yaml
  - rtsp-streamer.yaml
  - viewer.yaml
