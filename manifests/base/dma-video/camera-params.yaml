apiVersion: apps/v1
kind: Deployment
metadata:
  name: camera-params
  namespace: dma-video
spec:
  replicas: 1
  selector:
    matchLabels:
      app: camera-params
  template:
    metadata:
      labels:
        app: camera-params
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        foundation.bot/has-cameras: "true"
      containers:
        - name: camera-params
          image: foundationbot/dma-video:main
          imagePullPolicy: IfNotPresent
          # Compose: entrypoint → command, command → args
          command: ["python3", "src/camera_params_server.py"]
          args: ["--config", "/opt/configs/cameras.json", "--port", "8420"]
          volumeMounts:
            - name: cameras-config
              mountPath: /opt/configs/cameras.json
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
      volumes:
        # Per-robot OAK config from /etc/phantom/head_camera.json —
        # see producer.yaml for full rationale.
        - name: cameras-config
          hostPath:
            path: /etc/phantom/head_camera.json
            type: FileOrCreate
