apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# wm-inference reuses the shared `positronic` namespace (defined by the
# positronic base) — the z_ref shm contract is host-level POSIX shm, so
# the namespace is cosmetic. No namespace.yaml here to avoid a duplicate
# Namespace resource in the core stack.
resources:
  - configmap.yaml
  - wm-inference.yaml
