# policy-diagnostics — DaemonSet running the standalone DMA wire-integrity /
# characterization diagnostic node (dma_diagnostic_node) from
# foundationbot/policy-diagnostics-tools. This is the extraction of the
# diagnostic previously run in-process by phantom-locomotion's
# `mode: diagnostic` path (FIR-337) into its own image + workload, so the
# sweep can be scheduled independently of the locomotion policy node.
#
# ── Image ────────────────────────────────────────────────────────────────
# foundationbot/policy-diagnostics-tools. CI in that repo already owns the
# DockerHub repo (the existing wheels-<tag> tags are the non-runnable
# COPY-from wheel image); the RUNNABLE node image uses a distinct tag
# namespace (e.g. diagnostic-<ver> / a -aarch64 Jetson variant). The
# per-robot tag is rewritten by Kustomize from host-config.yaml's
# images.policy-diagnostics entry. The :PLACEHOLDER tag here is what the
# host-config image override binds to (and is skipped by the manifest scan).
#
# ── Container entry ──────────────────────────────────────────────────────
# Image ENTRYPOINT is /entrypoint.sh (a passthrough `exec "$@"` — no ROS);
# command=[/entrypoint.sh] + args=[policy-diagnostic-launch] makes the entry
# explicit. policy-diagnostic-launch is the env-driven launcher (the DIAG_*
# contract — analogue of phantom-locomotion's dma_launch.sh): it builds the
# dma_diagnostic_node CLI from DIAG_* env, runs the node DIAG_ITERATIONS
# times, then exits. The DaemonSet restartPolicy is Always, so while a node
# is opted in the sweep re-runs on each exit — it actively drives /desired
# joints (see gating below).
#
# ── Joystick (no ROS) ────────────────────────────────────────────────────
# The --wait-for-start (X) and stop (Square+Triangle) gates arrive over the
# /velocity_cmd DMA channel (VelocityCommandData.start_count/stop_count, read
# via DmaIpcClient.read_velocity_command()), NOT ROS. The joystick-publisher
# sidecar below reads /dev/input and produces that channel; the diagnostic
# reads it over shared /dev/shm (hostIPC). No DDS, so no hostNetwork.
#
# ── Gating ───────────────────────────────────────────────────────────────
# Default-OFF, opt-in per host via foundation.bot/has-policy-diagnostics
# (NODE_LABEL_REGISTRY in scripts/lib/host-config.py). It drives /desired,
# but is a deliberate operator-triggered characterization run, NOT a control
# brain — so it is intentionally OUTSIDE the has-positronic/locomotion/sonic
# mutual-exclusion group (an operator who enables it on a robot is expected
# to have stopped the policy node first).
#
# ── Host-PD gain sweep (testMode: host-pd-tune) ───────────────────────────
# The CST host-side-PD gain tuner runs as THIS same DaemonSet — no new node
# label; the existing has-policy-diagnostics gate covers it. Selected with
# phantomPolicyDiagnostics.testMode: host-pd-tune. It drives one joint at a
# time with a sine/chirp at candidate kp/kd (pushed over /desired as command
# stiffness/damping), scores tracking off /actuals, and reports the best
# gains. Its extra knobs (objective, sinePeriods/sineAgg, host-pd kp/kd box,
# osc/overshoot caps, mrCapDb) render as DIAG_* in host-config.py and are
# forwarded only-when-set by launch.py. hostPdConfig points at the DMA
# host-PD JSON mounted from the policy-diagnostics-hostpd ConfigMap below.
#
# ── No GPU ───────────────────────────────────────────────────────────────
# Pure Python + numpy/scipy; onnxruntime (imu-debug mode) is CPU-only. No
# runtimeClassName: nvidia, unlike phantom-locomotion.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: policy-diagnostics
  namespace: positronic
  labels:
    app.kubernetes.io/name: policy-diagnostics
    app.kubernetes.io/part-of: phantomos
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: policy-diagnostics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: policy-diagnostics
    spec:
      # Schedule only on robot nodes that explicitly opted in.
      nodeSelector:
        foundation.bot/robot: "true"
        foundation.bot/has-policy-diagnostics: "true"
      tolerations:
        - operator: Exists
          effect: NoSchedule

      # hostIPC + /dev/shm: the diagnostic and the joystick-publisher sidecar
      # talk to the DMA master (and each other, via /velocity_cmd) over
      # iceoryx shared-memory queues (DmaIpcClient), so they must share the
      # host IPC namespace and shm medium. iceoryx is shm-based, NOT network —
      # no hostNetwork/DDS. No GPU, so no runtimeClassName.
      hostIPC: true
      imagePullSecrets:
        - name: dockerhub-creds
      terminationGracePeriodSeconds: 15

      containers:
        - name: policy-diagnostics
          image: foundationbot/policy-diagnostics-tools:PLACEHOLDER
          imagePullPolicy: Always
          # /entrypoint.sh is a passthrough (exec "$@"). The launcher reads the
          # DIAG_* env from the optional ConfigMap below; with no ConfigMap
          # present the launcher's built-in defaults apply so the pod still
          # starts (and can be driven via `kubectl exec`).
          command:
            - /entrypoint.sh
          args:
            - policy-diagnostic-launch
          # --wait-for-start blocks on the joystick X gate over /velocity_cmd;
          # a TTY also lets an operator `kubectl exec -it` in and drive a sweep.
          stdin: true
          tty: true
          envFrom:
            # Per-host DIAG_* selection (test mode, robot, naming, iterations,
            # out path, joint bias overrides, gains, wait-for-start, …). Created
            # by bootstrap's policy-diagnostics-config phase, NOT in the GitOps
            # tree so ArgoCD doesn't reset per-host edits. optional: true means
            # kubelet doesn't block on it — the launcher's defaults kick in.
            - configMapRef:
                name: policy-diagnostics-config
                optional: true
          volumeMounts:
            - { name: shm,       mountPath: /dev/shm }
            # Robot tables (mj_order.json / imu_roles.json). Optional: IMU
            # tests are skipped when imu_roles.json is absent; mj naming
            # falls back to /config when mj_order.json is absent.
            - { name: tables,    mountPath: /etc/policy-diagnostics-tools, readOnly: true }
            # host-pd-tune sweep only: the DMA host-PD config JSON (per-joint
            # kp/kd, tauMaxNm, limits) the tuner reads via DIAG_HOST_PD_CONFIG
            # (--host-pd-config). Dedicated ConfigMap so it stays separate from
            # the robot tables; optional so non-sweep hosts still schedule.
            # Point phantomPolicyDiagnostics.hostPdConfig at a file under here,
            # e.g. /etc/policy-diagnostics-tools/hostpd/mk2_full_robot_hostpd.json
            - { name: hostpd-config, mountPath: /etc/policy-diagnostics-tools/hostpd, readOnly: true }
            # Diagnostic JSON reports land here (DIAG_OUT_PATH default lives
            # under /recordings/diag_reports). Same host tree dma-recorder
            # uses, so an operator `kubectl cp`s reports off the robot from
            # one place (/root/recordings on the host).
            - { name: recordings, mountPath: /recordings }
          resources:
            # Lighter than locomotion — pure-Python numpy/scipy, CPU-bound,
            # short bursts. RT pinning is the cpu-isolation phase's job.
            requests: { cpu: "1", memory: "1Gi" }
            limits:   { cpu: "2", memory: "2Gi" }
          securityContext:
            # Cross-IPC-namespace /dev/shm access, matching the
            # phantom-locomotion / dma-bridge posture.
            privileged: true

        # ── web-console sidecar (browser control — ships WITH policy-diagnostics)
        # Start / Stop / E-Stop buttons + a live desired-vs-actual plot for the
        # host-PD sweep. Same image, entry policy-diagnostic-webconsole. It owns
        # /velocity_cmd (create=True) and publishes the start_count/stop_count
        # the sweep's --wait-for-start gate watches; it reads the tuner's status
        # file over shared /dev/shm for the plot.
        #
        # URL: hostPort 8088 exposes it directly on the robot node, so the
        # console is at   http://<robot-node-ip>:8088   (no port-forward needed).
        #
        # WEB_TOKEN empty => OPEN: just press Start, no token to type. Set it to
        # require an operator token for Start (Stop/E-Stop stay always-allowed).
        #
        # MUTUALLY EXCLUSIVE with joystick-publisher below (both own
        # /velocity_cmd) — run one. This robot has no gamepad, so the console is
        # the active control and the joystick sidecar is left commented out.
        - name: web-console
          image: foundationbot/policy-diagnostics-tools:PLACEHOLDER
          imagePullPolicy: Always
          command: [/entrypoint.sh]
          args: [policy-diagnostic-webconsole]
          env:
            - { name: WEB_PORT,  value: "8088" }
            - { name: WEB_TOKEN, value: "" }   # empty => OPEN (no token to type)
          ports:
            - { name: webconsole, containerPort: 8088, hostPort: 8088 }
          volumeMounts:
            - { name: shm, mountPath: /dev/shm }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          securityContext:
            privileged: true   # cross-IPC /dev/shm (status file + /velocity_cmd)

        # ── joystick-publisher sidecar (ALTERNATIVE — gamepad control) ───────
        # For robots WITH a physical controller: reads /dev/input and publishes
        # VelocityCommandData on /velocity_cmd. Mutually exclusive with the
        # web-console above (both own /velocity_cmd) — uncomment this and comment
        # web-console to drive from a gamepad instead.
        #- name: joystick-publisher
        #  image: foundationbot/policy-diagnostics-tools:PLACEHOLDER
        #  imagePullPolicy: Always
        #  command: [/entrypoint.sh]
        #  args: [policy-diagnostic-joystick]
        #  env:
        #    - { name: SDL_VIDEODRIVER, value: "dummy" }
        #  volumeMounts:
        #    - { name: shm,       mountPath: /dev/shm }
        #    - { name: dev-input, mountPath: /dev/input }
        #  resources:
        #    requests: { cpu: "100m", memory: "128Mi" }
        #    limits:   { cpu: "500m", memory: "256Mi" }
        #  securityContext:
        #    privileged: true

      volumes:
        - name: shm
          hostPath: { path: /dev/shm,   type: Directory }
        - name: dev-input
          hostPath: { path: /dev/input, type: Directory }
        # Optional robot tables ConfigMap (not in the GitOps tree; operator-
        # or bootstrap-provided per host). optional so a host without it
        # still schedules.
        - name: tables
          configMap:
            name: policy-diagnostics-tables
            optional: true
        # host-pd-tune sweep config (DMA host-PD JSON). Not in the GitOps
        # tree — operator/bootstrap-provided per host (the same file dma_main
        # runs), so a host without it still schedules. See the container mount.
        - name: hostpd-config
          configMap:
            name: policy-diagnostics-hostpd
            optional: true
        # DirectoryOrCreate matches dma-recorder so the mount succeeds on
        # robots that have never written recordings.
        - name: recordings
          hostPath: { path: /root/recordings, type: DirectoryOrCreate }
