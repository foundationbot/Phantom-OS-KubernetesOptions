# prometheus — scrapes the collector's log/span-derived metrics + the host/shm
# exporters (all on localhost under hostNetwork). UI/API on host :10390.
# Translated from gaia/docker/docker-compose.yml `prometheus`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: gaia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        foundation.bot/has-gaia: "true"
      # root so it can own the hostPath TSDB dir (compose used a named volume).
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=30d
            - --storage.tsdb.retention.size=5GB
            - --web.listen-address=:10390
          ports:
            - { name: web, containerPort: 10390 }
          livenessProbe:
            httpGet: { path: /-/healthy, port: 10390 }
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - { name: prometheus-config, mountPath: /etc/prometheus }
            - { name: data, mountPath: /prometheus }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "2",    memory: "2Gi" }
      volumes:
        - name: prometheus-config
          configMap:
            name: gaia-prometheus-config
        - name: data
          hostPath:
            path: /data/gaia/prometheus
            type: DirectoryOrCreate
