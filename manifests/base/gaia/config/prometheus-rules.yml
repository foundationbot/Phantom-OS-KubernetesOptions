# =============================================================================
# gaia alerting rules. Loaded by prometheus.yml `rule_files:` (mounted read-only
# into the prometheus container). No Alertmanager is configured yet — alerts show
# up under Prometheus → Alerts and in Grafana; routing/paging is a follow-up.
# =============================================================================
groups:
  - name: gaia_bridge_health
    interval: 15s
    rules:
      # The dma-side bridges (boundary_bridge, loop_event_bridge) are the single
      # point of failure for the whole control-event pipeline — if one hangs,
      # boundary events just stop and nothing else says so. Each bridge pushes
      # `dma_bridge_heartbeat_timestamp_seconds` (wall-clock of its last beat,
      # every ~10 s) via OTLP → collector → Prometheus (namespace dma_debug). We
      # alert on the AGE of that gauge: `time() - last_beat`. This push-gauge
      # pattern is robust vs. absent_over_time temporality quirks, and `max by
      # (bridge)` keeps it per-bridge.
      - alert: BridgeHeartbeatStale
        expr: time() - max by (bridge) (dma_debug_dma_bridge_heartbeat_timestamp_seconds) > 30
        for: 1m
        labels:
          severity: critical
          subsystem: system
        annotations:
          summary: "Bridge {{ $labels.bridge }} heartbeat is stale"
          description: >
            No heartbeat from bridge "{{ $labels.bridge }}" for
            {{ $value | humanizeDuration }} (threshold 30s). The control-event
            pipeline may be silently stalled — boundary/loop events are not being
            drained. Check `docker logs` for that bridge container and that the
            producer's /dev/shm rings still exist (a dma-ethercat restart orphans
            them; the bridges must restart to re-attach).

      # The whole bridge metric series disappearing (container gone, not just a
      # missed beat) — absent() catches what the age expr can't (it needs the
      # series to exist). Warning: the series is absent for the first ~10s after a
      # cold start too, so `for: 2m` avoids boot-time noise.
      - alert: BridgeHeartbeatAbsent
        expr: absent(dma_debug_dma_bridge_heartbeat_timestamp_seconds)
        for: 2m
        labels:
          severity: critical
          subsystem: system
        annotations:
          summary: "No bridge heartbeat metric at all"
          description: >
            dma_debug_dma_bridge_heartbeat_timestamp_seconds is absent for >2m —
            no bridge is reporting liveness (all bridges down, or the collector is
            not receiving their OTLP metrics).

  # RT-preemption attribution (rtpreemptionalertdesign.md). The rt_attributor emits
  # `rt_preempted_by` over OTLP when a task/IRQ stole an isolated core and caused an
  # RT cycle overrun; the collector `count` connector surfaces it as a log-derived
  # metric keyed by `code`. The event itself (Loki) names the offender + cause_class;
  # these alerts just flag that it is happening / recurring.
  - name: gaia_rt_preemption
    interval: 15s
    rules:
      - alert: RTPreemption
        expr: sum(rate(dma_debug_dma_log_records_total{code="rt_preempted_by"}[5m])) > 0
        for: 0m
        labels:
          severity: warning
          subsystem: control
        annotations:
          summary: "An isolated RT core is being preempted"
          description: >
            rt_preempted_by events are firing — a task/IRQ stole an isolated core and
            an RT cycle overran. Open Loki ({code="rt_preempted_by"}) for the
            offender_comm / cause_class / stolen_us, or the "top RT preemptors" panel
            on DMA RT / Jitter (S4). cause_class HARDWARE/BUS means no task thief
            (firmware latency or a long ec_receive — check the receive-phase span).
      # Sustained preemption is a determinism problem, not a one-off blip.
      - alert: RTPreemptionSustained
        expr: sum(rate(dma_debug_dma_log_records_total{code="rt_preempted_by"}[5m])) > 0.2
        for: 5m
        labels:
          severity: high
          subsystem: control
        annotations:
          summary: "Sustained RT-core preemption (>1 overrun/5s for 5m)"
          description: >
            rt_preempted_by has been firing steadily for 5m — an isolated core is
            repeatedly being stolen. Identify the offender (Loki / the dashboard
            panel) and move it off the isolated cores (cpuset / IRQ affinity).

  # AL2 metric-threshold alerts (alerting_console_plan.md). Complementary to the incident_store
  # event path — these fire off Prometheus for Grafana/Alertmanager. All are rate/`for`-throttled
  # (AL5: alert on a SUSTAINED condition, not every occurrence) so they don't storm. No paging
  # sink wired yet (pre-prod): they surface in Prometheus /alerts + Grafana. Over-temperature is
  # deliberately omitted until the motor temp-limit=0 config bug is fixed (would fire on every read).
  - name: gaia_transport
    interval: 30s
    rules:
      - alert: QueueStale
        expr: max by (queue) (dma_shmq_staleness_ms) > 2000
        for: 2m
        labels: { severity: warning, subsystem: transport }
        annotations:
          summary: "shm queue stale >2s for 2m"
          description: >
            A /dev/shm queue has had no fresh writes for over 2s, sustained 2m — the producer may
            have stalled. See the Queue-bus tab (Staleness) / Ask Gaia "which queue is most stale?".
      - alert: QueueDrops
        expr: increase(dma_shmq_wraparounds_total[5m]) > 0
        for: 5m
        labels: { severity: warning, subsystem: transport }
        annotations:
          summary: "shm queue dropping (ring wraparounds) for 5m"
          description: >
            A queue is wrapping its ring past unread slots — a consumer is falling behind the
            producer and losing data. Queue-bus → Drops column, or Ask Gaia "which queue is dropping?".
      - alert: DevShmFull
        expr: max(dma_shmq_devshm_used_pct) > 90
        for: 5m
        labels: { severity: high, subsystem: transport }
        annotations:
          summary: "/dev/shm over 90% full"
          description: >
            The shared-memory filesystem is nearly full — queue allocations may start failing.
  - name: gaia_rt
    interval: 30s
    rules:
      - alert: MissedDeadlines
        expr: rate(dma_debug_dma_missed_deadlines_total[5m]) > 0
        for: 5m
        labels: { severity: high, subsystem: control }
        annotations:
          summary: "RT loop missing deadlines (sustained 5m)"
          description: >
            The control loop is missing cycle deadlines steadily — a determinism problem. Check the
            RT-preemption panel (a CPU thief?) and the ecat-exchange phase (bus wait?).
      - alert: WkcErrorRate
        expr: rate(dma_debug_dma_wkc_errors_total[5m]) > 1
        for: 2m
        labels: { severity: high, subsystem: control }
        annotations:
          summary: "EtherCAT WKC errors climbing (bus corruption)"
          description: >
            Working-counter errors are accumulating >1/s for 2m — EtherCAT frames are being
            corrupted / slaves dropping. Check the bus (cabling, a specific slave branch) and
            dma-ethercat logs.
      - alert: BridgeDropped
        expr: increase(dma_debug_dma_bridge_consumer_dropped_total[5m]) > 0
        for: 5m
        labels: { severity: warning, subsystem: system }
        annotations:
          summary: "a bridge is dropping events (5m)"
          description: >
            A boundary/loop-event bridge is dropping events — its consumer can't keep up, so
            telemetry/events are being lost downstream.
