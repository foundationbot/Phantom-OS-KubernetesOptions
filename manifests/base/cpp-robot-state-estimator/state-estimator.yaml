# cpp-robot-state-estimator — DaemonSet running the IMU + kinematic
# state estimator (foundation/DMA/cpp-robot-state-estimator). Replaces
# its docker-compose.yml on robots that opt in via
# foundation.bot/has-state-estimator.
#
# Independent of the positronic / locomotion choice — both consume
# /state_estimator output from the same shm queues this writer
# publishes to. Operators enable wherever state estimation is wanted.
#
# ── Image ────────────────────────────────────────────────────────────────
# foundationbot/cpp-robot-state-estimator. CI publishes
# <branch>-latest-<arch> tags; per-robot tag rewritten via host-config
# images.cpp-robot-state-estimator.
#
# ── Args ────────────────────────────────────────────────────────────────
# Image ENTRYPOINT is `state_estimator_node`. Defaults below mirror the
# docker-compose:
#   --urdf, --config — paths to files baked into the image at
#                      /usr/local/share/phantom/urdf|config/.
#   --mujoco-model — MuJoCo XML (baked at config/mujoco/) whose
#                      <site name="*_imu" quat=...> entries give the IMU
#                      sensor->body mount rotations. The SE applies these
#                      itself (recomputes body-frame accel/gyro/proj_gravity/
#                      so3 from the always-raw sensor fields), so it is the
#                      single authority for the rotation — DMA.ethercat's
#                      --enable-body-frame-rotation is NOT required (and must
#                      not be relied on; the SE overwrites from raw).
#   --body-frame-rotation enabled — consume the body-frame IMU fields
#                      (now populated by the SE's own --mujoco-model
#                      preprocessing). Keep ENABLED so the updaters read the
#                      rotated fields; do NOT set disabled (that reads raw).
#
# Override per-robot by adding cpp-robot-state-estimator to the
# host-config deployments block once DEPLOYMENT_TARGETS gets it (not
# in this PR — file an op when needed).
#
# ── CPU pinning ──────────────────────────────────────────────────────────
# state_estimator_node does NOT hard-pin a CPU core by default. (It used to
# default to --cpu 19, which fails with EINVAL inside a pod whose cpuset the
# kubelet assigned to a different core — the pin silently failed while the log
# still claimed core 19.) With no --cpu it inherits the pod's cgroup/k8s
# cpuset; SCHED_FIFO RT priority still applies (the pod has SYS_NICE). To
# hard-pin, isolate a core via the cpu-isolation phase and pass it per-robot
# through host-config extraArgs (see the host-config template):
#     deployments:
#       cpp-robot-state-estimator:
#         extraArgs: [--cpu, "19"]
# Resource requests below are scheduler hints, not RT guarantees.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cpp-robot-state-estimator
  namespace: positronic
  labels:
    app.kubernetes.io/name: cpp-robot-state-estimator
    app.kubernetes.io/part-of: phantomos
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cpp-robot-state-estimator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cpp-robot-state-estimator
    spec:
      nodeSelector:
        foundation.bot/robot: "true"
        foundation.bot/has-state-estimator: "true"
      tolerations:
        - operator: Exists
          effect: NoSchedule

      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      imagePullSecrets:
        - name: dockerhub-creds
      terminationGracePeriodSeconds: 15

      containers:
        - name: state-estimator
          image: foundationbot/cpp-robot-state-estimator:PLACEHOLDER
          imagePullPolicy: IfNotPresent
          # ENTRYPOINT in the image is state_estimator_node — args below
          # match the docker-compose defaults. Files referenced are
          # baked into the image at /usr/local/share/phantom/.
          args:
            - --urdf
            - /usr/local/share/phantom/urdf/20250206_phantom_mk1_clean.urdf
            - --config
            - /usr/local/share/phantom/config/state_estimator_params.json
            - --mujoco-model
            - /usr/local/share/phantom/config/mujoco/phantom_mk1.xml
            - --body-frame-rotation
            - enabled
          env:
            - { name: ROS_DOMAIN_ID,      value: "0" }
            - { name: RMW_IMPLEMENTATION, value: "rmw_fastrtps_cpp" }
          volumeMounts:
            - { name: shm, mountPath: /dev/shm }
          resources:
            # Scheduler hint only — not real RT pinning. The SE no longer
            # hard-pins by default; to dedicate a core, isolate one via
            # cpu-isolation and pass --cpu through host-config extraArgs
            # (see the CPU pinning note above).
            requests: { cpu: "1", memory: "1Gi" }
            limits:   { cpu: "1", memory: "2Gi" }
          securityContext:
            capabilities:
              add:
                - SYS_NICE   # set RT scheduling priority
                - IPC_LOCK   # mlock for FastDDS shared memory
      volumes:
        - name: shm
          hostPath: { path: /dev/shm, type: Directory }
