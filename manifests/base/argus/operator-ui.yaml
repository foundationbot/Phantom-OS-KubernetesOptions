apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator-ui
  namespace: argus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: operator-ui
  template:
    metadata:
      labels:
        app: operator-ui
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: operator-ui
          image: foundationbot/argus.operator-ui:gaia-chat
          imagePullPolicy: IfNotPresent
          ports:
            # hostPort so the UI is reachable directly on the robot at :8004
            # (matches the operator_ui compose `8004:8004`), in addition to the
            # argus-nginx NodePort :30080 same-origin entry.
            - containerPort: 8004
              hostPort: 8004
          env:
            - name: ENV
              value: qa
            - name: GATEWAY_URL
              value: /api
            # ROBOT is the per-host robot identifier (e.g. "mk11000009")
            # — operator-ui's robotConfig.ts looks it up to derive the
            # camera server URL (http://${aiPcIp}:8889) used by the
            # Camera Hub. Without ROBOT, getCameraServerUrl() falls
            # back to http://localhost:8889 (the operator's own
            # browser machine) and every camera shows "offline".
            # Sourced from the per-host operator-ui-pairing CM,
            # populated by bootstrap-robot.sh from $(hostname).
            - name: ROBOT
              valueFrom:
                configMapKeyRef:
                  name: operator-ui-pairing
                  key: ROBOT
            # AI_PC_URL and CONTROL_PC_URL are same-origin relative
            # paths. argus-nginx proxies them to the AI PC and the
            # robot's phantomos-api-server respectively, using the
            # AI_PC_HOST / CONTROL_PC_HOST keys from the per-host
            # operator-ui-pairing ConfigMap. Keeping the operator-ui
            # pod stateless w.r.t. those IPs means a re-pairing only
            # bounces nginx, not this Deployment.
            # Temporary: this robot has no separate AI PC, so the
            # "AI PC Stats" card on the Command Center is repointed
            # at the robot's own phantomos-api-server (same backend
            # CONTROL_PC_URL uses). Flip AI_PC_URL back to /api/ai
            # once an AI PC at AI_PC_HOST:5000 is reachable.
            - name: AI_PC_URL
              value: /api/control
            - name: CONTROL_PC_URL
              value: /api/control
            - name: RERUN_URL
              value: rerun+http://nitrogen:9876/proxy
            # gaia + rerun nginx upstreams. This robot runs everything on the
            # one host, so point them at the robot's own tailscale IP (the
            # operator-ui-pairing CONTROL_PC_HOST). Without these the image
            # defaults GAIA_HOST to the unresolvable "host-gateway" and the
            # operator-ui nginx emergs at startup ("host not found in upstream").
            - name: GAIA_HOST
              valueFrom:
                configMapKeyRef:
                  name: operator-ui-pairing
                  key: CONTROL_PC_HOST
            - name: RERUN_HOST
              valueFrom:
                configMapKeyRef:
                  name: operator-ui-pairing
                  key: CONTROL_PC_HOST
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: operator-ui
  namespace: argus
spec:
  selector:
    app: operator-ui
  ports:
    - port: 8004
      targetPort: 8004
