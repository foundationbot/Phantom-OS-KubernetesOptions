# Pre-bound hostPath PV for Redis data
apiVersion: v1
kind: PersistentVolume
metadata:
  name: redis-pv
  annotations:
    # Don't let ArgoCD prune this PV if it's removed from git — data on
    # the hostPath is irrecoverable. Manual `kubectl delete pv` only.
    argocd.argoproj.io/sync-options: Prune=false
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /var/lib/k0s-data/redis
    type: DirectoryOrCreate
  claimRef:
    namespace: argus
    name: data-redis-0
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: argus
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ""
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: argus
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
