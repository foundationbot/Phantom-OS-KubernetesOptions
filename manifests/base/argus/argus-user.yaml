apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-user
  namespace: argus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argus-user
  template:
    metadata:
      labels:
        app: argus-user
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: argus-user
          image: foundationbot/argus.user:qa
          imagePullPolicy: Always
          ports:
            - containerPort: 9001
          env:
            - name: SERVICE_NAME
              value: argus-user
            - name: PORT
              value: "9001"
            - name: MONGODB_URI
              value: mongodb://mongodb:27017/ArgusDB
            - name: MONGODB_HOST
              value: mongodb
            - name: MONGODB_PORT
              value: "27017"
            - name: MONGODB_DATABASE
              value: ArgusDB
            - name: USERS_COLLECTION
              value: users
            - name: ACCESSES_COLLECTION
              value: accesses
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "1"
            - name: REDIS_TTL_SECONDS
              value: "60"
            - name: SESSION_EXPIRY_HOURS
              value: "8"
            - name: OFFLINE_APP_IDS
              value: 691bcf923433f53b6a11874d
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: argus-user
  namespace: argus
spec:
  selector:
    app: argus-user
  ports:
    - port: 9001
      targetPort: 9001
