# Pre-bound hostPath PV — no storage provisioner needed.
# The StatefulSet's volumeClaimTemplate creates PVC "data-mongodb-0",
# which binds to this PV via the claimRef.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongodb-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /var/lib/k0s-data/mongodb
    type: DirectoryOrCreate
  claimRef:
    namespace: argus
    name: data-mongodb-0
---
# Seed data ConfigMap (from argus.operator-ui/seed-data.js)
