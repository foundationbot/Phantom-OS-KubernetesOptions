# Pre-bound hostPath PV — no storage provisioner needed.
# The StatefulSet's volumeClaimTemplate creates PVC "data-mongodb-0",
# which binds to this PV via the claimRef.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongodb-pv
  annotations:
    # PVs hold data on hostPaths with reclaimPolicy: Retain. Even if a
    # PV is removed from git, ArgoCD must not delete the live PV — the
    # data is irrecoverable on its own. Removal is an explicit
    # `kubectl delete pv` decision.
    argocd.argoproj.io/sync-options: Prune=false
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /var/lib/k0s-data/mongodb
    type: DirectoryOrCreate
  claimRef:
    namespace: argus
    name: data-mongodb-0
---
