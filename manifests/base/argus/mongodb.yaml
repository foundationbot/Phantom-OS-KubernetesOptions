    db.login_credentials.createIndex({ user_id: 1 }, { unique: true });
    db.accesses.createIndex({ user_id: 1, app_id: 1 }, { unique: true });
    db.accesses.createIndex({ app_id: 1 });

    print('Seeding completed successfully!');
    print('Users created: ' + db.users.countDocuments({}));
    print('Login credentials created: ' + db.login_credentials.countDocuments({}));
    print('Accesses created: ' + db.accesses.countDocuments({}));
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: argus
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: ArgusDB
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: seed-data
              mountPath: /docker-entrypoint-initdb.d/seed-data.js
              subPath: seed-data.js
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: seed-data
          configMap:
            name: mongodb-seed-data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ""
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: argus
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
