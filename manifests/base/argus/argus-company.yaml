apiVersion: apps/v1
kind: Deployment
metadata:
  name: argus-company
  namespace: argus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argus-company
  template:
    metadata:
      labels:
        app: argus-company
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: argus-company
          image: foundationbot/argus.company:qa
          imagePullPolicy: Always
          ports:
            - containerPort: 9002
          env:
            - name: SERVICE_NAME
              value: argus-company
            - name: PORT
              value: "9002"
            - name: MONGODB_URI
              value: mongodb://mongodb:27017/ArgusDB
            - name: MONGODB_HOST
              value: mongodb
            - name: MONGODB_PORT
              value: "27017"
            - name: MONGODB_DATABASE
              value: ArgusDB
            - name: APPS_COLLECTION
              value: apps
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "2"
            - name: REDIS_TTL_SECONDS
              value: "60"
            - name: SESSION_EXPIRY_HOURS
              value: "8"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: argus-company
  namespace: argus
spec:
  selector:
    app: argus-company
  ports:
    - port: 9002
      targetPort: 9002
