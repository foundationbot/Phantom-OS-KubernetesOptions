# ConfigMap: external reverse proxy config (from argus.operator-ui/nginx.conf)
# Routes / → operator-ui:8004, /api/ → argus-gateway:9100
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: argus
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        upstream operator-ui {
            server operator-ui:8004;
        }

        upstream argus-gateway {
            server argus-gateway:9100;
        }

        server {
            listen 80;
            server_name _;

            location / {
                proxy_pass http://operator-ui;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /api/ {
                proxy_pass http://argus-gateway;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Session-Token $http_x_session_token;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: argus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
# NodePort exposes the Operator UI on port 30080 from outside the cluster.
# Access the UI at http://<robot-ip>:30080
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: argus
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
