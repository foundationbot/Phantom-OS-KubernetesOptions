# positronic-control DaemonSet — based on the live mk11test k0s deployment
# (k0s kubectl -n positronic get ds positronic-control), sanitized of cluster-runtime
# fields, with ONE change: positronic_control is PULLED — /src and /root/.ihmc come
# from the image (built with the code baked in, e.g. docker/phantom/production.Dockerfile
# `COPY ./ /src`), NOT bind-mounted from /root/foundation/positronic_control. The base
# ref below is the canonical foundationbot/positronic-control:PLACEHOLDER; host-config
# images.positronic-control swaps it to your per-branch/beta build (e.g.
# foundationbot/phantom-cuda:<tag>), which MUST carry the code. Models stay a
# hostPath (/root/models); /data, /dev, /dev/shm etc. remain host mounts.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: positronic-control
  namespace: positronic
spec:
  selector:
    matchLabels:
      app: positronic-control
  template:
    metadata:
      labels:
        app: positronic-control
    spec:
      containers:
      - args:
        - /bin/bash
        - -c
        - "if [ -n \"${PHANTOM_CMD:-}\" ]; then\n  source /opt/ros/${ROS_DISTRO}/setup.bash 2>/dev/null || true\n  source /amr_ws/install/setup.bash         2>/dev/null || true\n  source /src/workspace/install/setup.bash\
          \  2>/dev/null || true\n  exec bash -c \"${PHANTOM_CMD}\"\nelse\n  exec sleep infinity\nfi\n"
        env:
        - name: PHANTOM_MODELS
          value: /root/models
        - name: TORCH_HOME
          value: /root/.cache/torch
        - name: HF_HUB_CACHE
          value: /root/.cache/huggingface/hub
        - name: TRANSFORMERS_CACHE
          value: /root/.cache/huggingface/hub
        - name: HF_HUB_OFFLINE
          value: '1'
        - name: ACCEPT_EULA
          value: Y
        - name: ROS_DOMAIN_ID
          value: '109'
        - name: FASTRTPS_DEFAULT_PROFILES_FILE
          value: /src/workspace/fastdds_config.xml
        - name: LOGNAME
          value: root
        - name: NVIDIA_VISIBLE_DEVICES
          value: all
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: all
        envFrom:
        - configMapRef:
            name: positronic-config
            optional: true
        image: foundationbot/positronic-control:PLACEHOLDER
        imagePullPolicy: IfNotPresent
        name: positronic-control
        resources:
          limits:
            cpu: '2'
            memory: 16Gi
          requests:
            cpu: '2'
            memory: 16Gi
        securityContext:
          privileged: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        # /src (positronic_control code) + /root/.ihmc come from the IMAGE now
        # (pulled), not a host clone — see header.
        - mountPath: /root/models
          name: models
        - mountPath: /root/.cache/torch/hub
          name: torch-hub
        - mountPath: /root/.gradle
          name: gradle
        - mountPath: /recordings
          name: recordings
        - mountPath: /data
          name: data
        - mountPath: /data2
          name: data2
        - mountPath: /dev
          name: dev
        - mountPath: /dev/shm
          name: shm
        - mountPath: /tmp
          name: tmp
        workingDir: /src/workspace
      dnsPolicy: ClusterFirstWithHostNet
      hostIPC: true
      hostNetwork: true
      imagePullSecrets:
      - name: dockerhub-creds
      nodeSelector:
        foundation.bot/has-positronic: 'true'
      restartPolicy: Always
      runtimeClassName: nvidia
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      # NOTE: no `src` / `ihmc` hostPath — positronic_control code is baked into
      # the image (pulled), not bind-mounted from /root/foundation/positronic_control.
      - hostPath:
          path: /root/models
          type: Directory
        name: models
      - hostPath:
          path: /root/.cache/torch
          type: DirectoryOrCreate
        name: torch-hub
      - hostPath:
          path: /root/.gradle
          type: DirectoryOrCreate
        name: gradle
      - hostPath:
          path: /root/recordings
          type: DirectoryOrCreate
        name: recordings
      - hostPath:
          path: /data
          type: Directory
        name: data
      - hostPath:
          path: /data2
          type: DirectoryOrCreate
        name: data2
      - hostPath:
          path: /dev
          type: Directory
        name: dev
      - hostPath:
          path: /dev/shm
          type: Directory
        name: shm
      - hostPath:
          path: /tmp
          type: Directory
        name: tmp
  updateStrategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
