# positronic-control — k0s Deployment that replaces the `phantom` service
# in imu-policy/positronic_control/docker/development.docker-compose.yaml.
# Source of truth: docs/plans/2026-04-24-positronic-k0s-migration.md.
#
# Two images flow into this pod:
#   1. localhost:5443/positronic-control:<tag>  — the executing image
#      (currently foundationbot/phantom-cuda retagged for the local registry).
#      Tag rewritten per-robot via Kustomize's `images:` transformer.
#   2. localhost:5443/phantom-models:<tag>      — pure-data image, mounted
#      at /root/models via Kubernetes' image: volume source (KEP-4639,
#      GA in k8s 1.33+). Tag rewritten via a per-robot patch in the
#      overlay's `patches:` block — `images:` does NOT rewrite the
#      `volumes[].image.reference` field.
#
# Default mode: PHANTOM_CMD empty → `sleep infinity`. Operator execs in
# for interactive ROS work. Set PHANTOM_CMD in the ConfigMap to flip
# the pod into service mode (decision D5 in the plan).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: positronic-control
  namespace: positronic
spec:
  replicas: 1
  strategy:
    type: Recreate          # hostNetwork + hostPath PVC-style mounts; no rolling overlap
  selector:
    matchLabels:
      app: positronic-control
  template:
    metadata:
      labels:
        app: positronic-control
    spec:
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: positronic-control
          image: localhost:5443/positronic-control:PLACEHOLDER
          imagePullPolicy: IfNotPresent
          workingDir: /src/workspace
          # PHANTOM_CMD-or-sleep-infinity dispatch (decision D5 + plan §3.4).
          # ROS_DISTRO comes from the image's environment (jazzy on
          # the current aarch64 build); the source lines are
          # best-effort so a missing overlay doesn't kill the whole
          # command. exec ensures the chosen process becomes PID 1
          # for clean SIGTERM handling.
          args:
            - /bin/bash
            - -c
            - |
              if [ -n "${PHANTOM_CMD:-}" ]; then
                source /opt/ros/${ROS_DISTRO}/setup.bash 2>/dev/null || true
                source /amr_ws/install/setup.bash         2>/dev/null || true
                source /src/workspace/install/setup.bash  2>/dev/null || true
                exec bash -c "${PHANTOM_CMD}"
              else
                exec sleep infinity
              fi
          envFrom:
            - configMapRef:
                name: positronic-config
                optional: true
          env:
            # Hardcoded — image contract, never varies per robot.
            - { name: PHANTOM_MODELS,                  value: /root/models }
            - { name: RMW_IMPLEMENTATION,              value: rmw_fastrtps_cpp }
            - { name: FASTRTPS_DEFAULT_PROFILES_FILE,  value: /src/workspace/fastdds_config.xml }
            - { name: ACCEPT_EULA,                     value: "Y" }
            - { name: HF_HUB_OFFLINE,                  value: "1" }
            - { name: HF_HUB_CACHE,                    value: /root/.cache/huggingface/hub }
            - { name: TRANSFORMERS_CACHE,              value: /root/.cache/huggingface/hub }
            - { name: TORCH_HOME,                      value: /root/.cache/torch/hub }
          volumeMounts:
            # IPC + devices + scratch
            - { name: shm,            mountPath: /dev/shm }
            - { name: dev,            mountPath: /dev }
            - { name: tmp,            mountPath: /tmp }
            # positronic_control checkout — colcon builds inside the
            # container land back on the host at /root/foundation/...
            - { name: src,            mountPath: /src }
            - { name: ihmc-config,    mountPath: /root/.ihmc }
            # Data partitions
            - { name: data,           mountPath: /data }
            - { name: data2,          mountPath: /data2 }
            - { name: trainground,    mountPath: /trainground }
            - { name: recordings,     mountPath: /recordings }
            - { name: torch-hub,      mountPath: /root/.cache/torch/hub }
            # Models — image volume (KEP-4639), not a hostPath
            - { name: models,         mountPath: /root/models, readOnly: true }
          resources:
            # 8 CPU / 16Gi as a starting point (plan §3.7). Guaranteed
            # QoS so CPU Manager pins onto specific cores from the
            # allocatable pool; the reserved-core policy in k0s.yaml
            # already excludes the cores reserved for the host.
            requests:
              cpu: "8"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
          securityContext:
            # Mirrors compose `privileged: true` — needed for GPU
            # tegra device nodes + raw IMU/EtherCAT/camera access.
            # Drop when the NVIDIA k8s device plugin is in and the
            # full device list is enumerated.
            privileged: true
      volumes:
        - name: shm
          hostPath: { path: /dev/shm,                                       type: Directory }
        - name: dev
          hostPath: { path: /dev,                                           type: Directory }
        - name: tmp
          hostPath: { path: /tmp,                                           type: Directory }
        - name: src
          hostPath: { path: /root/foundation/DMA/positronic_control,        type: Directory }
        - name: ihmc-config
          hostPath: { path: /root/foundation/DMA/positronic_control/workspace/.ihmc, type: DirectoryOrCreate }
        - name: data
          hostPath: { path: /data,                                          type: DirectoryOrCreate }
        - name: data2
          hostPath: { path: /data2,                                         type: DirectoryOrCreate }
        - name: trainground
          hostPath: { path: /root/trainground,                              type: DirectoryOrCreate }
        - name: recordings
          hostPath: { path: /root/recordings,                               type: DirectoryOrCreate }
        - name: torch-hub
          hostPath: { path: /data/torch,                                    type: DirectoryOrCreate }
        # Models bundled as their own image — see scripts/phantom-models/.
        # The `reference:` PLACEHOLDER is rewritten per-robot via a
        # strategic-merge patch in the overlay; Kustomize's images:
        # transformer does not touch image-volume references.
        - name: models
          image:
            reference: localhost:5443/phantom-models:PLACEHOLDER
            pullPolicy: IfNotPresent
