# positronic-control — DaemonSet that replaces the `phantom` service
# in imu-policy/positronic_control/docker/development.docker-compose.yaml.
#
# A DaemonSet rather than a Deployment for symmetry with the other
# robot workloads (phantom-locomotion, dma-recorder, rerun-streamer,
# cpp-robot-state-estimator, yovariable-server). Gating on
# foundation.bot/has-positronic via nodeSelector means a robot opting
# out of positronic gets zero pods — versus a Deployment that always
# wants 1 replica and would leave a Pending pod when the selector
# doesn't match.
#
# One image runs in this pod, rewritten per-robot via Kustomize's
# `images:` transformer in the overlay:
#   localhost:5443/positronic-control:<tag>  — the executing image
#   (currently foundationbot/phantom-cuda retagged for the local registry).
#
# Models are NOT loaded per-pod anymore (FIR-467). The model tree is
# extracted ONCE onto the host at /root/models by bootstrap's
# extract-models phase (scripts/extract-models-to-host.sh, driven from the
# phantom-models image ref in host-config.yaml). This pod read-only
# bind-mounts that host dir at /root/models. No initContainer, no emptyDir
# copy on every pod start — the same /root/models the phantomos-api-server
# already serves to the operator-ui policy picker. Models are
# self-versioned (the image tag changes when content changes), so the host
# dir is a flat, overwritten-in-place tree.
#
# Default mode: PHANTOM_CMD empty → `sleep infinity`. Operator execs in
# for interactive ROS work. Set PHANTOM_CMD in the ConfigMap to flip
# the pod into service mode.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: positronic-control
  namespace: positronic
spec:
  selector:
    matchLabels:
      app: positronic-control
  template:
    metadata:
      labels:
        app: positronic-control
    spec:
      # Mutually exclusive with phantom-locomotion. Default-on:
      # the cluster phase reconciler injects
      # foundation.bot/has-positronic=true on every robot unless
      # host-config nodeLabels: explicitly sets it to "false". To
      # migrate a robot to phantom-locomotion, set
      #   foundation.bot/has-positronic: "false"
      #   foundation.bot/has-locomotion: "true"
      # in /etc/phantomos/host-config.yaml. The host-config validator
      # rejects has-locomotion=true with default-on positronic.
      nodeSelector:
        foundation.bot/has-positronic: "true"
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      # dockerhub-creds is seeded by bootstrap phase 5 (seed-pull-secrets).
      # Required when an image override swaps either container's image
      # to a foundationbot/* (private DockerHub) ref. Harmless when the
      # local-registry default is in effect — kubelet ignores the auth
      # token for unauthenticated registries.
      imagePullSecrets:
        - name: dockerhub-creds
      # GPU access flows through the nvidia container runtime registered
      # in containerd by scripts/configure-k0s-nvidia-runtime.sh. The
      # named RuntimeClass lives in manifests/base/runtime-classes/nvidia.yaml.
      # Without this, /dev/nvidia* device nodes are present (privileged +
      # /dev mount) but the userspace driver libs are missing — anything
      # touching libcuda fails with "NVIDIA Driver was not detected".
      runtimeClassName: nvidia
      containers:
        - name: positronic-control
          image: localhost:5443/positronic-control:PLACEHOLDER
          imagePullPolicy: IfNotPresent
          workingDir: /src/workspace
          # PHANTOM_CMD-or-sleep-infinity dispatch (decision D5 + plan §3.4).
          # ROS_DISTRO comes from the image's environment (jazzy on
          # the current aarch64 build); the source lines are
          # best-effort so a missing overlay doesn't kill the whole
          # command. exec ensures the chosen process becomes PID 1
          # for clean SIGTERM handling.
          args:
            - /bin/bash
            - -c
            - |
              if [ -n "${PHANTOM_CMD:-}" ]; then
                source /opt/ros/${ROS_DISTRO}/setup.bash 2>/dev/null || true
                source /amr_ws/install/setup.bash         2>/dev/null || true
                source /src/workspace/install/setup.bash  2>/dev/null || true
                exec bash -c "${PHANTOM_CMD}"
              else
                exec sleep infinity
              fi
          envFrom:
            - configMapRef:
                name: positronic-config
                optional: true
          env:
            # Hardcoded — image contract, never varies per robot.
            # NVIDIA_* are normally inherited from upstream nvcr.io base
            # images, but not every BASE_IMAGE in our chain sets them
            # (e.g. amd64 derives from osrf/ros). Set explicitly so the
            # nvidia-container-runtime hook reliably injects all GPUs +
            # driver libs regardless of base image.
            - { name: NVIDIA_VISIBLE_DEVICES,          value: all }
            - { name: NVIDIA_DRIVER_CAPABILITIES,      value: all }
            - { name: PHANTOM_MODELS,                  value: /root/models }
            - { name: RMW_IMPLEMENTATION,              value: rmw_fastrtps_cpp }
            - { name: FASTRTPS_DEFAULT_PROFILES_FILE,  value: /src/workspace/fastdds_config.xml }
            - { name: ACCEPT_EULA,                     value: "Y" }
            - { name: HF_HUB_OFFLINE,                  value: "1" }
            - { name: HF_HUB_CACHE,                    value: /root/.cache/huggingface/hub }
            - { name: TRANSFORMERS_CACHE,              value: /root/.cache/huggingface/hub }
            - { name: TORCH_HOME,                      value: /root/.cache/torch/hub }
          volumeMounts:
            # Universal kernel/runtime mounts. EVERY OTHER hostPath
            # (data partitions, source checkout, recordings, torch
            # cache, etc.) comes from /etc/phantomos/host-config.yaml's
            # deployments.positronic-control.mounts list, injected at
            # bootstrap time as a strategic-merge patch on the
            # phantomos-<robot>-core Application's
            # spec.source.kustomize.patches. See docs and the wizard
            # ('configure-host.sh') for the per-host fields.
            - { name: shm,            mountPath: /dev/shm }
            - { name: dev,            mountPath: /dev }
            - { name: tmp,            mountPath: /tmp }
            # Models — host's /root/models bind-mounted read-only. Populated
            # once by bootstrap's extract-models phase, not per-pod.
            - { name: models,         mountPath: /root/models, readOnly: true }
          resources:
            # 8 CPU / 16Gi as a starting point (plan §3.7). Guaranteed
            # QoS so CPU Manager pins onto specific cores from the
            # allocatable pool; the reserved-core policy in k0s.yaml
            # already excludes the cores reserved for the host.
            requests:
              cpu: "8"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
          securityContext:
            # Mirrors compose `privileged: true` — needed for GPU
            # tegra device nodes + raw IMU/EtherCAT/camera access.
            # Drop when the NVIDIA k8s device plugin is in and the
            # full device list is enumerated.
            privileged: true
      volumes:
        # Universal kernel/runtime mounts only. Per-host mounts live
        # in /etc/phantomos/host-config.yaml's deployments.positronic-control
        # block and are injected as a strategic-merge patch by bootstrap.
        - name: shm
          hostPath: { path: /dev/shm, type: Directory }
        - name: dev
          hostPath: { path: /dev,     type: Directory }
        - name: tmp
          hostPath: { path: /tmp,     type: Directory }
        # Models — host's /root/models bind-mounted in (FIR-467). The tree
        # is extracted once by bootstrap's extract-models phase from the
        # phantom-models image; the main container mounts it read-only.
        # DirectoryOrCreate so a freshly-imaged host with no models yet
        # still schedules (the pod CrashLoops until the extract populates
        # it, then self-recovers). Same /root/models the phantomos-api-server
        # serves to the operator-ui policy picker.
        - name: models
          hostPath:
            path: /root/models
            type: DirectoryOrCreate
