# positronic-control — k0s Deployment that replaces the `phantom` service
# in imu-policy/positronic_control/docker/development.docker-compose.yaml.
#
# Two images flow into this pod, both rewritten per-robot via Kustomize's
# `images:` transformer in the overlay:
#   1. localhost:5443/positronic-control:<tag>  — the executing image
#      (currently foundationbot/phantom-cuda retagged for the local registry).
#   2. localhost:5443/phantom-models:<tag>      — busybox-based image whose
#      /models tree gets copied into a shared emptyDir by the load-models
#      initContainer; the main container mounts that emptyDir at /root/models.
#
# Models are loaded via initContainer + emptyDir copy rather than the
# native image: volume because k0s 1.35.3's containerd has only partial
# image-volume support (fails with `mkdir ""` at OCI spec generation).
# When/if k0s catches up, switch back to the image: volume — the manifest
# diff is small.
#
# Default mode: PHANTOM_CMD empty → `sleep infinity`. Operator execs in
# for interactive ROS work. Set PHANTOM_CMD in the ConfigMap to flip
# the pod into service mode.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: positronic-control
  namespace: positronic
spec:
  replicas: 1
  strategy:
    type: Recreate          # hostNetwork + hostPath PVC-style mounts; no rolling overlap
  selector:
    matchLabels:
      app: positronic-control
  template:
    metadata:
      labels:
        app: positronic-control
    spec:
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      # GPU access flows through the nvidia container runtime registered
      # in containerd by scripts/configure-k0s-nvidia-runtime.sh. The
      # named RuntimeClass lives in manifests/base/runtime-classes/nvidia.yaml.
      # Without this, /dev/nvidia* device nodes are present (privileged +
      # /dev mount) but the userspace driver libs are missing — anything
      # touching libcuda fails with "NVIDIA Driver was not detected".
      runtimeClassName: nvidia
      initContainers:
        # Copy /models from the phantom-models image into the shared
        # emptyDir, which the main container then mounts at /root/models.
        # busybox provides sh + cp; phantom-models is built FROM busybox
        # for exactly this purpose. The init image's tag is rewritten
        # per-robot by the same Kustomize `images:` transformer that
        # handles the main container.
        - name: load-models
          image: localhost:5443/phantom-models:PLACEHOLDER
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              echo "==> copying /models -> /shared"
              cp -a /models/. /shared/
              echo "==> done; /shared contents:"
              ls -la /shared | head
          volumeMounts:
            - name: models
              mountPath: /shared
          resources:
            # requests == limits so this container is Guaranteed; without
            # that, the whole pod's QoS drops to Burstable and we lose CPU
            # Manager pinning on the main container. The init runs once
            # for ~10–30 s during pod start, so over-allocating briefly
            # is fine.
            requests: { cpu: "1", memory: "1Gi" }
            limits:   { cpu: "1", memory: "1Gi" }
      containers:
        - name: positronic-control
          image: localhost:5443/positronic-control:PLACEHOLDER
          imagePullPolicy: IfNotPresent
          workingDir: /src/workspace
          # PHANTOM_CMD-or-sleep-infinity dispatch (decision D5 + plan §3.4).
          # ROS_DISTRO comes from the image's environment (jazzy on
          # the current aarch64 build); the source lines are
          # best-effort so a missing overlay doesn't kill the whole
          # command. exec ensures the chosen process becomes PID 1
          # for clean SIGTERM handling.
          args:
            - /bin/bash
            - -c
            - |
              if [ -n "${PHANTOM_CMD:-}" ]; then
                source /opt/ros/${ROS_DISTRO}/setup.bash 2>/dev/null || true
                source /amr_ws/install/setup.bash         2>/dev/null || true
                source /src/workspace/install/setup.bash  2>/dev/null || true
                exec bash -c "${PHANTOM_CMD}"
              else
                exec sleep infinity
              fi
          envFrom:
            - configMapRef:
                name: positronic-config
                optional: true
          env:
            # Hardcoded — image contract, never varies per robot.
            - { name: PHANTOM_MODELS,                  value: /root/models }
            - { name: RMW_IMPLEMENTATION,              value: rmw_fastrtps_cpp }
            - { name: FASTRTPS_DEFAULT_PROFILES_FILE,  value: /src/workspace/fastdds_config.xml }
            - { name: ACCEPT_EULA,                     value: "Y" }
            - { name: HF_HUB_OFFLINE,                  value: "1" }
            - { name: HF_HUB_CACHE,                    value: /root/.cache/huggingface/hub }
            - { name: TRANSFORMERS_CACHE,              value: /root/.cache/huggingface/hub }
            - { name: TORCH_HOME,                      value: /root/.cache/torch/hub }
          volumeMounts:
            # Universal kernel/runtime mounts. EVERY OTHER hostPath
            # (data partitions, source checkout, recordings, torch
            # cache, etc.) comes from /etc/phantomos/host-config.yaml's
            # deployments.positronic-control.mounts list, injected at
            # bootstrap time as a strategic-merge patch on the
            # phantomos-<robot>-core Application's
            # spec.source.kustomize.patches. See docs and the wizard
            # ('configure-host.sh') for the per-host fields.
            - { name: shm,            mountPath: /dev/shm }
            - { name: dev,            mountPath: /dev }
            - { name: tmp,            mountPath: /tmp }
            # Models — populated by the load-models initContainer.
            - { name: models,         mountPath: /root/models, readOnly: true }
          resources:
            # 8 CPU / 16Gi as a starting point (plan §3.7). Guaranteed
            # QoS so CPU Manager pins onto specific cores from the
            # allocatable pool; the reserved-core policy in k0s.yaml
            # already excludes the cores reserved for the host.
            requests:
              cpu: "8"
              memory: "16Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
          securityContext:
            # Mirrors compose `privileged: true` — needed for GPU
            # tegra device nodes + raw IMU/EtherCAT/camera access.
            # Drop when the NVIDIA k8s device plugin is in and the
            # full device list is enumerated.
            privileged: true
      volumes:
        # Universal kernel/runtime mounts only. Per-host mounts live
        # in /etc/phantomos/host-config.yaml's deployments.positronic-control
        # block and are injected as a strategic-merge patch by bootstrap.
        - name: shm
          hostPath: { path: /dev/shm, type: Directory }
        - name: dev
          hostPath: { path: /dev,     type: Directory }
        - name: tmp
          hostPath: { path: /tmp,     type: Directory }
        # Models — emptyDir populated by the load-models initContainer
        # which copies /models from the phantom-models image. emptyDir
        # lives on the kubelet's pod-volumes disk so it disappears with
        # the pod; that's fine here because the source-of-truth is the
        # registry-pinned image and re-population is fast.
        - name: models
          emptyDir: {}
