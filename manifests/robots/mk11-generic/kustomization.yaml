apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# mk11-generic robot overlay. Generic baseline for any mk11-class robot
# that doesn't yet have its own per-unit overlay; cloned from ak-007.
commonAnnotations:
  robot: mk11-generic
  fleet: phantomos
resources:
  - ../../base/runtime-classes
  - ../../base/registry
    #  - ../../base/argus
  - ../../base/nimbus
  - ../../base/dma-video
  - ../../base/positronic
  - ../../base/phantomos-api-server
  - ../../base/yovariable-server
images:
  - name: foundationbot/argus.operator-ui
    newTag: 585e58803318f5366d793986ad3e6129538b8a81
  # Locally-built positronic-control image. Bump newTag after each
  # `docker push localhost:5443/positronic-control:<sha>` on the robot.
  - name: localhost:5443/positronic-control
    newTag: 0.2.44-cu130
  # phantom-models is the initContainer image (load-models). Kustomize's
  # `images:` transformer rewrites both containers and initContainers, so
  # this entry covers it cleanly. Bump after each
  # `sudo python3 scripts/phantom-models/build.py`.
  - name: localhost:5443/phantom-models
    newTag: 2026-04-26
  # phantomos-api-server: pin to a specific CircleCI-published build
  # rather than tracking :latest (so a fleet-wide tag bump on DockerHub
  # doesn't move this robot without an explicit overlay change).
  - name: foundationbot/phantomos-api-server
    newTag: V-1-0-1-20260430-001713
patches:
  #- path: patches/operator-ui-env.yaml
  #  target:
  #    kind: Deployment
  #    name: operator-ui
  #    namespace: argus
