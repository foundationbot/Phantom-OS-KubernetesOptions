apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Argentum robot overlay.
# To onboard a new robot: copy robots/argentum/ to robots/<name>/, update
# commonAnnotations, add any robot-specific patches (e.g. IOT_THING_NAME
# on nimbus/eg-jobs, different resource limits), and create a matching
# Application CR in gitops/apps/.

commonAnnotations:
  robot: argentum
  fleet: phantomos

resources:
  - ../../base/argus
  - ../../base/nimbus
  - ../../base/dma-video

