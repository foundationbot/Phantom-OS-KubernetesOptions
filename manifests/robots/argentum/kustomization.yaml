apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Argentum robot overlay.
# To onboard a new robot: copy robots/argentum/ to robots/<name>/, update
# commonAnnotations, add any robot-specific patches (e.g. IOT_THING_NAME
# on nimbus/eg-jobs, different resource limits), and create a matching
# Application CR in gitops/apps/.
commonAnnotations:
  robot: argentum
  fleet: phantomos
resources:
  - ../../base/argus
  - ../../base/nimbus
  - ../../base/dma-video
# Per-robot image pins. CircleCI builds foundationbot/argus.operator-ui:<sha>
# on every push to the default branch; this block overrides the base tag
# (qa) with a specific SHA. Session D's CI automation will mutate newTag
# here on every source-repo build.
images:
  - name: foundationbot/argus.operator-ui
    newTag: 585e58803318f5366d793986ad3e6129538b8a81
