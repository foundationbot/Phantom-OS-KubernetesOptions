apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: phantomos-argentum
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/foundationbot/Phantom-OS-KubernetesOptions
    targetRevision: main
    path: manifests/robots/argentum
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
