# phantomos ops — action registry.
#
# Single source of truth for the TUI menu. Adding a new entry is one
# stanza here — see docs/ops-tui-dev-guide.md for the field reference,
# safety classification, and conventions.
#
# Field cheat sheet:
#   id              <group>.<short_name>, lowercase snake_case
#   group           must match a groups[].id below
#   title           operator intent — verb phrase, no script names
#   blurb           1-4 lines of detail-pane copy
#   safety          green | yellow | red
#   confirm_word    required when safety: red (modal magic word)
#   command         argv list (NEVER a shell string)
#   requires        capabilities — kubectl, root, argocd, recorder_pod
#   runs_on         [robot, dev] (default), [robot], or [dev]
#   duration        operator hint — "~1s", "3-8 min", "interactive", "streams"
#   reversible      defaults to true; false on red forces confirm modal
#   form            null (launcher-only) or "<module>" under forms/
#   dry_run         optional argv override for `d` keybinding

groups:
  - id: bootstrap
    title: "Bootstrap & Host"
    order: 1
  - id: workloads
    title: "Workloads"
    order: 2
  - id: streams
    title: "Recording & Streams"
    order: 3
  - id: registry
    title: "Registry"
    order: 4
  - id: builds
    title: "Builds"
    order: 5
  - id: diagnostics
    title: "Diagnostics"
    order: 6

actions:

  # ---------------------------------------------------------------- Bootstrap

  - id: bootstrap.bring_online
    group: bootstrap
    title: "Bring this machine online from scratch"
    blurb: |
      End-to-end k0s + ArgoCD bootstrap. Idempotent on a populated host
      but heavy-handed on a fresh one — installs k0s, configures
      containerd mirrors, registers nvidia runtime, applies host config,
      and renders Argo Applications. Prompts (cpusets, argocd password,
      Continue confirmations) render as native TUI modals via the
      ops-prompt bridge.
    safety: red
    confirm_word: "bootstrap"
    requires: [root]
    runs_on: [robot]
    duration: "5-15 min"
    reversible: false
    form: bootstrap_bring_online
    command: ["bash", "scripts/bootstrap-robot.sh"]

  - id: bootstrap.configure_host
    group: bootstrap
    title: "Edit per-host configuration"
    blurb: |
      Walks the operator through /etc/phantomos/host-config.yaml —
      robot identity, image overrides, mounts, node labels.
      Prompts render as native TUI Input/Confirm modals via the
      ops-prompt bridge.
    safety: yellow
    requires: [root]
    runs_on: [robot]
    duration: "interactive"
    command: ["bash", "scripts/configure-host.sh"]

  - id: bootstrap.containerd_mirror
    group: bootstrap
    title: "Wire k0s to the local registry mirror"
    blurb: |
      Configures k0s containerd to route docker.io/* through the local
      registry at localhost:5443 first, falling through on cache miss.
    safety: yellow
    requires: [root]
    runs_on: [robot]
    duration: "~10s"
    command: ["bash", "scripts/configure-k0s-containerd-mirror.sh"]

  - id: bootstrap.nvidia_runtime
    group: bootstrap
    title: "Enable the NVIDIA container runtime"
    blurb: |
      Registers the nvidia container runtime with k0s's containerd so
      pods that request GPU resources actually get them.
    safety: yellow
    requires: [root]
    runs_on: [robot]
    duration: "~30s"
    command: ["bash", "scripts/configure-k0s-nvidia-runtime.sh"]

  - id: bootstrap.cpusets
    group: bootstrap
    title: "Carve out real-time CPU partitions"
    blurb: |
      Creates cgroup-v2 cpuset partitions and a systemd boot service
      so EtherCAT RT loops have dedicated cores reserved across reboots.
    safety: yellow
    requires: [root]
    runs_on: [robot]
    duration: "~5s"
    command: ["bash", "scripts/cpusets/manage_cpusets.sh"]

  - id: bootstrap.ethercat_nic
    group: bootstrap
    title: "Pin the EtherCAT NIC to a real-time core"
    blurb: |
      Steers the EtherCAT NIC's IRQs onto a dedicated RT core, locks
      its governor, and persists the policy via a systemd unit.
    safety: yellow
    requires: [root]
    runs_on: [robot]
    duration: "~5s"
    command: ["bash", "scripts/cpusets/setup_ethercat_interface.sh"]

  # --- single-phase re-runs (idempotent; operators run these far more
  #     often than a full bring-online once a robot is up) ----------------

  - id: bootstrap.gitops
    group: bootstrap
    title: "Re-render & apply the ArgoCD Applications"
    blurb: |
      Runs bootstrap phase --gitops only: terraform apply (ArgoCD Helm
      chart) + render/apply the per-stack Application CRs from
      host-config.yaml. Idempotent; safe to re-run after editing stacks
      or targetRevision.
    safety: yellow
    requires: [root]
    runs_on: [robot]
    duration: "1-3 min"
    command: ["bash", "scripts/bootstrap-robot.sh", "--gitops"]
    dry_run: ["bash", "scripts/bootstrap-robot.sh", "--gitops", "--dry-run"]

  - id: bootstrap.image_overrides
    group: bootstrap
    title: "Push image tag overrides into the live Applications"
    blurb: |
      Runs phase --image-overrides only: injects host-config.yaml's
      images: into each stack's Application via kustomize.images. Use
      after bumping a tag in host-config.
    safety: yellow
    requires: [root]
    runs_on: [robot]
    duration: "~30s"
    command: ["bash", "scripts/bootstrap-robot.sh", "--image-overrides"]
    dry_run: ["bash", "scripts/bootstrap-robot.sh", "--image-overrides", "--dry-run"]

  - id: bootstrap.deployments
    group: bootstrap
    title: "Apply per-host deployment mounts/patches"
    blurb: |
      Runs phase --deployments only: injects host-config.yaml's
      deployments: block as strategic-merge patches per stack. Use
      after editing mounts or the positronic launchCommand.
    safety: yellow
    requires: [root]
    runs_on: [robot]
    duration: "~30s"
    command: ["bash", "scripts/bootstrap-robot.sh", "--deployments"]
    dry_run: ["bash", "scripts/bootstrap-robot.sh", "--deployments", "--dry-run"]

  - id: bootstrap.operator_ui_config
    group: bootstrap
    title: "Re-pair the operator UI to the AI PC"
    blurb: |
      Runs phase --operator-ui-config only: re-renders the
      operator-ui-pairing ConfigMap (AI_PC_HOST + CONTROL_PC_HOST) and
      rolls operator-ui if the value changed. Use after moving the AI PC.
    safety: yellow
    requires: [root]
    runs_on: [robot]
    duration: "~30s"
    command: ["bash", "scripts/bootstrap-robot.sh", "--operator-ui-config"]
    dry_run: ["bash", "scripts/bootstrap-robot.sh", "--operator-ui-config", "--dry-run"]

  - id: bootstrap.locomotion_config
    group: bootstrap
    title: "Apply the locomotion policy ConfigMap"
    blurb: |
      Runs phase --locomotion-config only: renders the
      phantom-locomotion-config ConfigMap from host-config's
      phantomLocomotion block and rolls the DaemonSet if present.
    safety: yellow
    requires: [root]
    runs_on: [robot]
    duration: "~20s"
    command: ["bash", "scripts/bootstrap-robot.sh", "--locomotion-config"]
    dry_run: ["bash", "scripts/bootstrap-robot.sh", "--locomotion-config", "--dry-run"]

  - id: bootstrap.log_management
    group: bootstrap
    title: "Install journald + logrotate disk caps"
    blurb: |
      Runs phase --log-management only: installs drop-ins capping
      journald and rsyslog disk use. Idempotent; the safety net against
      a full /var/log/syslog.
    safety: yellow
    requires: [root]
    runs_on: [robot]
    duration: "~10s"
    command: ["bash", "scripts/bootstrap-robot.sh", "--log-management"]
    dry_run: ["bash", "scripts/bootstrap-robot.sh", "--log-management", "--dry-run"]

  # ---------------------------------------------------------------- Workloads

  - id: positronic.status
    group: workloads
    title: "Show what positronic-control is doing right now"
    blurb: |
      Snapshot of pod state: QoS, restarts, runtimeClass, PHANTOM_CMD
      (CM + as-seen by pod), PID 1 cmd.
    safety: green
    requires: [kubectl]
    duration: "~1s"
    command: ["bash", "scripts/positronic.sh", "status"]

  - id: positronic.logs
    group: workloads
    title: "Tail positronic-control logs"
    blurb: "Streams the main container's logs. Ctrl-C to stop."
    safety: green
    requires: [kubectl]
    duration: "streams"
    form: positronic_logs
    command: ["bash", "scripts/positronic.sh", "logs", "-f"]

  - id: positronic.exec
    group: workloads
    title: "Drop into a shell (positronic | locomotion)"
    blurb: "Interactive bash inside the running pod. Pick the target."
    safety: green
    requires: [kubectl]
    duration: "interactive"
    interactive: true
    form: positronic_exec
    command: ["bash", "scripts/positronic.sh", "exec", "positronic"]

  - id: positronic.diagnose
    group: workloads
    title: "Diagnose unhealthy positronic-control"
    blurb: |
      Investigates why the pod is unhappy: image pulls, volumes,
      runtimeClass, recent restarts. Optionally applies a fix.
    safety: yellow
    requires: [kubectl]
    duration: "~30s"
    command: ["bash", "scripts/diagnose-positronic.sh"]

  # --- other workloads: status + logs via the generic workload.sh
  #     wrapper (resolves kubectl / k0s kubectl) -------------------------

  - id: locomotion.status
    group: workloads
    title: "Show phantom-locomotion state"
    blurb: "Pods, controllers, and per-container restarts for the phantom-locomotion DaemonSet."
    safety: green
    requires: [kubectl]
    duration: "~1s"
    command: ["bash", "scripts/workload.sh", "status", "positronic", "phantom-locomotion"]

  - id: locomotion.logs
    group: workloads
    title: "Tail phantom-locomotion logs"
    blurb: "Streams the locomotion policy node's logs. Ctrl-C to stop."
    safety: green
    requires: [kubectl]
    duration: "streams"
    command: ["bash", "scripts/workload.sh", "logs", "positronic", "phantom-locomotion", "-f"]

  - id: ik_mk2.status
    group: workloads
    title: "Show ik-mk2 state"
    blurb: "Pods, controllers, and restarts for the MK2 upper-body IK shim DaemonSet."
    safety: green
    requires: [kubectl]
    duration: "~1s"
    command: ["bash", "scripts/workload.sh", "status", "positronic", "ik-mk2"]

  - id: ik_mk2.logs
    group: workloads
    title: "Tail ik-mk2 logs"
    blurb: "Streams the ik-mk2 DaemonSet logs. Ctrl-C to stop."
    safety: green
    requires: [kubectl]
    duration: "streams"
    command: ["bash", "scripts/workload.sh", "logs", "positronic", "ik-mk2", "-f"]

  - id: state_estimator.status
    group: workloads
    title: "Show cpp-robot-state-estimator state"
    blurb: "Pods, controllers, and restarts for the state-estimator DaemonSet."
    safety: green
    requires: [kubectl]
    duration: "~1s"
    command: ["bash", "scripts/workload.sh", "status", "positronic", "cpp-robot-state-estimator"]

  - id: state_estimator.logs
    group: workloads
    title: "Tail cpp-robot-state-estimator logs"
    blurb: "Streams the state-estimator logs. Ctrl-C to stop."
    safety: green
    requires: [kubectl]
    duration: "streams"
    command: ["bash", "scripts/workload.sh", "logs", "positronic", "cpp-robot-state-estimator", "-f"]

  - id: dma_bridge.status
    group: workloads
    title: "Show dma-bridge state"
    blurb: "Pods, controllers, and restarts for the dma-bridge DaemonSet (FE WebSocket bridge, phantom ns)."
    safety: green
    requires: [kubectl]
    duration: "~1s"
    command: ["bash", "scripts/workload.sh", "status", "phantom", "dma-bridge"]

  - id: dma_bridge.logs
    group: workloads
    title: "Tail dma-bridge logs"
    blurb: "Streams the dma-bridge logs. Ctrl-C to stop."
    safety: green
    requires: [kubectl]
    duration: "streams"
    command: ["bash", "scripts/workload.sh", "logs", "phantom", "dma-bridge", "-f"]

  - id: deployment.reset
    group: workloads
    title: "Tear down + rebuild stateful resources"
    blurb: |
      Deletes the core Argo Application + workloads in phantom,
      positronic, nimbus, argus. PVCs recreated; on-disk data
      preserved. ArgoCD reconciles from git.
    safety: red
    confirm_word: "reset"
    requires: [kubectl]
    duration: "3-8 min"
    reversible: false
    command: ["bash", "scripts/reset-deployment.sh"]

  # ---------------------------------------------------------------- Streams

  - id: streams.record_start
    group: streams
    title: "Start a recording"
    blurb: |
      Sends RECORDING_START to the dma-recorder pod. A new
      recording_YYYYMMDD_HHMMSS.rrd opens on the next sample.
    safety: yellow
    requires: [kubectl]
    duration: "<1s"
    command: ["bash", "scripts/dma-cmd.sh", "record", "start"]

  - id: streams.record_stop
    group: streams
    title: "Stop the active recording"
    blurb: |
      Sends RECORDING_STOP. Recorder flushes its columnar batch and
      closes the current .rrd.
    safety: yellow
    requires: [kubectl]
    duration: "<1s"
    command: ["bash", "scripts/dma-cmd.sh", "record", "stop"]

  - id: streams.ping
    group: streams
    title: "Ping the recorder"
    blurb: "Liveness probe — sends PING and prints round-trip latency."
    safety: green
    requires: [kubectl]
    duration: "<1s"
    command: ["bash", "scripts/dma-cmd.sh", "ping"]

  - id: streams.raw
    group: streams
    title: "Send a raw opcode"
    blurb: "Send any opcode by hex value. For experts only."
    safety: yellow
    requires: [kubectl]
    duration: "<1s"
    form: "streams_raw"
    # command provided by the form module.
    command: ["bash", "scripts/dma-cmd.sh", "raw"]

  # ---------------------------------------------------------------- Registry

  - id: registry.prime
    group: registry
    title: "Pre-pull upstream images into the local registry"
    blurb: |
      Pulls upstream images and pushes them to localhost:5443 so
      pods don't go to the public network.
    safety: yellow
    requires: [kubectl]
    duration: "1-15 min"
    form: registry_prime
    command: ["bash", "scripts/prime-registry-cache.sh"]

  - id: registry.prune
    group: registry
    title: "List or remove tags & reclaim disk"
    blurb: |
      Lists tags via skopeo and optionally deletes matching ones,
      then GCs the registry filesystem.
    safety: red
    confirm_word: "prune"
    requires: [kubectl]
    duration: "1-5 min"
    reversible: false
    form: "registry_prune"
    command: ["bash", "scripts/prune-registry-tags.sh"]

  - id: registry.resize
    group: registry
    title: "Resize the registry's storage"
    blurb: |
      Recreates the k0s-registry PVC at a target capacity. PV is
      retained but rebound. Recovery: re-prime if needed.
    safety: red
    confirm_word: "wipe"
    requires: [kubectl]
    duration: "~1 min"
    reversible: false
    command: ["bash", "scripts/resize-registry-pvc.sh"]

  - id: registry.validate
    group: registry
    title: "Verify the local registry is wired up correctly"
    blurb: "Runs the 13-test smoke suite against localhost:5443."
    safety: green
    requires: [kubectl]
    duration: "~30s"
    command: ["bash", "scripts/validate-local-registry.sh"]

  - id: registry.rebind_pvc
    group: registry
    title: "Recover a stuck (Lost) volume claim"
    blurb: |
      Manually rebinds a PersistentVolumeClaim stuck in phase Lost.
      Use only when the PVC has gone Lost and ArgoCD can't fix it.
    safety: red
    confirm_word: "proceed"
    requires: [kubectl]
    duration: "~30s"
    reversible: false
    command: ["bash", "scripts/rebind-stuck-pvc.sh"]

  # ---------------------------------------------------------------- Builds

  - id: builds.phantom_models
    group: builds
    title: "Build & publish the phantom-models image"
    blurb: |
      Bundles model weights + configs into a busybox-based image and
      pushes it to localhost:5443/phantom-models:<tag>.
    safety: yellow
    duration: "1-5 min"
    runs_on: [dev]
    command:
      - "python3"
      - "scripts/phantom-models/build.py"
      - "--image"
      - "phantom-models"

  - id: builds.phantom_policies
    group: builds
    title: "Build & publish the phantom-policies image"
    blurb: |
      Slim ONNX-only image consumed by phantom-locomotion's
      load-policies init. Pushed to localhost:5443/phantom-policies.
    safety: yellow
    duration: "<1 min"
    runs_on: [dev]
    command:
      - "python3"
      - "scripts/phantom-models/build.py"
      - "--image"
      - "phantom-policies"

  # ---------------------------------------------------------------- Diagnostics

  - id: diagnostics.perfmon
    group: diagnostics
    title: "Record system performance"
    blurb: |
      CPU / GPU / EMC / power / perf counters → CSV + PNG. Useful for
      profiling RT-loop jitter and locomotion compute headroom.
    safety: green
    duration: "streams"
    runs_on: [robot]
    command: ["python3", "scripts/thor-perfmon.py"]
