# Generic per-host configuration template.
#
# Copy to /etc/phantomos/host-config.yaml (or pass to bootstrap with
# `--host-config`) and replace placeholder values. This is the single
# source-of-truth for per-host config — bootstrap derives everything
# else (operator-ui-pairing ConfigMap, Argo Application image overrides,
# /etc/phantomos/robot) from this file.

# Robot identity. Must match a directory under manifests/robots/ in
# the deployed branch.
robot: REPLACE-WITH-ROBOT-NAME

# Tailscale URL of the AI PC paired with this robot. Bootstrap renders
# /etc/phantomos/operator-ui-pairing.yaml from this value.
aiPcUrl: http://REPLACE-WITH-AI-PC-TAILSCALE-IP:5000

# Per-host kustomize image overrides. Bootstrap injects this list into
# the live phantomos-<robot> Argo Application's
# spec.source.kustomize.images. The list overrides anything declared in
# manifests/robots/<robot>/kustomization.yaml's images block.
#
# `name` is the image reference declared in the Deployment manifest;
# `newTag` is the tag this robot should pull. `newName` is optional.
images:
  - name: localhost:5443/positronic-control
    newTag: REPLACE-WITH-LOCAL-BUILD-TAG
  - name: localhost:5443/phantom-models
    newTag: REPLACE-WITH-MODEL-BUILD-DATE
  - name: foundationbot/argus.operator-ui
    newTag: REPLACE-WITH-OPERATOR-UI-COMMIT-SHA

# Optional: dev-mode hostPath mounts. Only set this on developer
# machines. Bootstrap injects a strategic-merge patch into the live
# Argo Application; ArgoCD will not revert it. Leaving the block out
# (or commenting it) reverts the robot to a clean production topology
# the next time bootstrap runs.
#
# Rules:
#   - Paths must be ABSOLUTE. '~' is rejected (bootstrap runs as root).
#   - privileged: true grants /dev passthrough — only enable on dev
#     machines you control. Bootstrap warns loudly when you do.
#   - Single source path is mounted into the container at /src.
#
# devMode:
#   positronic-control:
#     source: /home/<user>/development/foundation/positronic_control
#     mounts:
#       - {host: /data,                       container: /data}
#       - {host: /data2,                      container: /data2}
#       - {host: /home/<user>/recordings,     container: /recordings}
#       - {host: /home/<user>/trainground,    container: /trainground}
#       - {host: /home/<user>/.cache/torch/hub, container: /root/.cache/torch/hub}
#     privileged: true
