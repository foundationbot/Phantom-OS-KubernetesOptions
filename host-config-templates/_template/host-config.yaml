# Generic per-host configuration template.
#
# Copy to /etc/phantomos/host-config.yaml (or pass to bootstrap with
# `--host-config`) and replace placeholder values. This is the single
# source-of-truth for per-host config — bootstrap derives the rendered
# Argo Application CRs (one per stack), the operator-ui-pairing
# ConfigMap, and the persisted robot-id file from this single file.

# Robot identity. DNS-1123: lowercase alphanumeric + hyphens, 1..63
# chars, bookended by alphanumeric. Used in Argo Application names
# (phantomos-<robot>-core, phantomos-<robot>-operator, ...).
robot: REPLACE-WITH-ROBOT-NAME

# Tailscale URL of the AI PC paired with this robot. Bootstrap renders
# /etc/phantomos/operator-ui-pairing.yaml from this value. Phase 6
# stores ONLY the host portion as the AI_PC_HOST key in the CM; the
# operator-ui and vr-web Deployments compose their full URLs from it
# via Kubernetes env-var substitution ($(AI_PC_HOST)):
#
#   operator-ui  AI_PC_URL          http://$(AI_PC_HOST):5000
#   vr-web       CAMERA_SERVER_URL  http://$(AI_PC_HOST):8889
#   vr-web       ROSBRIDGE_URL      ws://$(AI_PC_HOST):9090
#
# A robot move (new AI PC) is therefore a single-line update — every
# downstream URL re-renders on the next pod start.
aiPcUrl: http://REPLACE-WITH-AI-PC-TAILSCALE-IP:5000

# vr-web TLS certificate. WebXR (Quest 3) requires HTTPS, and the
# vr-web Pod terminates TLS itself against a per-host Tailscale-issued
# cert. There is no host-config field — the cert files live at fixed
# paths so the bootstrap workflow stays a single `tailscale cert` plus
# two file moves:
#
#   sudo tailscale cert <robot>.<tailnet>.ts.net
#   sudo mkdir -p /etc/phantomos/vr-web-tls
#   sudo install -m 0644 <fqdn>.crt /etc/phantomos/vr-web-tls/cert.crt
#   sudo install -m 0600 <fqdn>.key /etc/phantomos/vr-web-tls/cert.key
#   sudo bash scripts/bootstrap-robot.sh --operator-ui-config
#
# Phase 6 reflects those files into a kubernetes.io/tls Secret named
# argus/vr-web-tls. Missing files leave the vr-web Pod in
# ContainerCreating until they're populated and the phase is re-run.
# Renewals work the same way — Tailscale rotates the cert, copy it back
# into the same paths, re-run the phase.

# Optional. Branch / tag / SHA the per-host ArgoCD Applications should
# track. Bootstrap substitutes this into every rendered Application CR
# at bringup. Default: main.
targetRevision: main

# Optional. Global production mode. When true, ArgoCD auto-reverts
# manual cluster edits (selfHeal: true) on every stack that doesn't
# override it under stacks.<name>.selfHeal. When false (default), drift
# is reported but not corrected — useful for dev/debug machines where
# on-call might `kubectl edit` resources during incidents.
# CLI override: --production / --no-production.
production: false

# Stack toggles + per-stack selfHeal overrides.
#
#   stacks.core      always required; cannot be disabled.
#   stacks.operator  argus + nimbus (operator UI, episode storage).
#                    Toggle the whole group with enabled: false.
#
# Each stack's selfHeal: field is optional. When set, it overrides the
# top-level production: flag for that stack only — useful when you want
# the robot in production mode but the operator UI tolerant of manual
# debugging, or vice-versa.
stacks:
  core:
    # selfHeal: true        # uncomment to override production:
  operator:
    enabled: true
    # selfHeal: false       # uncomment to leave drift alone

# Per-host image overrides. Container-keyed: each entry names a known
# container and supplies the full image ref (repo:tag) it should run.
# Bootstrap looks up the container in CONTAINER_TARGETS
# (scripts/lib/host-config.py) to find the image reference the BASE
# manifest currently uses, then injects a kustomize.images entry that
# rewrites every reference to that image in the rendered manifests.
#
#   - if your `image:` keeps the same repo as the base manifest, only
#     the tag changes (typical for a local-registry build).
#   - if your `image:` swaps the repo (e.g. localhost:5443/positronic-control
#     -> foundationbot/phantom-cuda), bootstrap emits a
#     "<base>=<your-image>" kustomize entry that renames AND retags in
#     one step. No special host-config field needed — just write the
#     full ref you want.
#
# Known containers (others are rejected at validate-time):
#   positronic-control   core stack — manifest uses
#                          localhost:5443/positronic-control
#   phantom-models       core stack — positronic-control's load-models init.
#                          manifest uses localhost:5443/phantom-models.
#                          Bundles model weights / configs (~GB).
#                          NOTE: phantomos-api-server no longer consumes this
#                          image — it bind-mounts /root/models off the host
#                          directly. Only positronic-control still pulls it.
#   phantom-policies     core stack — phantom-locomotion's load-policies init.
#                          manifest uses localhost:5443/phantom-policies.
#                          Slim image with ONNX files at /models/policies/.
#                          Build with `scripts/phantom-models/build.py
#                          --image phantom-policies --manifest <yaml>`.
#   operator-ui          operator stack — manifest uses
#                          foundationbot/argus.operator-ui
#   vr-web               operator stack — browser-based VR teleop UI
#                          (Quest 3 / WebXR). manifest uses
#                          foundationbot/argus.vr.web.react.
#   voice-server         operator stack — in-cluster Vosk recognizer
#                          fronting vr-web's /api/voice. manifest uses
#                          foundationbot/argus.voice-server.
#   yovariable-server    core stack — yovariable-server DaemonSet.
#                          manifest uses foundationbot/yovariable-server.
#   dma-ethercat         NOT stack-routed — bootstrap-managed installer
#                          Job. Phase 9 reads images.dma-ethercat.image
#                          directly. Tag convention:
#                            *-latest-aarch64  Jetson / arm64 robots
#                            *-latest-amd64    x86 robots
#   phantom-locomotion     core stack — phantom-locomotion DaemonSet.
#                          Container key tracks the workload; the image
#                          actually published is
#                          foundationbot/phantom-dma-inference (CI
#                          publishes -aarch64 for Jetson). Same key/image
#                          indirection as operator-ui above.
#   cpp-robot-state-estimator
#                          core stack — IMU + kinematic state estimator
#                          DaemonSet. Tag convention <branch>-latest-<arch>.
#   dma-streams            core stack — single image, two DaemonSets:
#                          dma-recorder (has-recorder) writes .rrd files,
#                          rerun-streamer (has-streamer) serves live web
#                          viz on :9788. manifest uses
#                          foundationbot/dma-streams. One entry here
#                          rewrites both. Tag convention <branch>-latest-<arch>.
#   ik-mk2                 core stack — ik-mk2 DaemonSet (MK2 upper-body IK
#                          shim, has-ik-mk2, default-off). Multi-arch
#                          manifest tag foundationbot/ik-mk2:V-<x-y-z>-<ts>
#                          from the IK_MK2 repo CI. Only needed on hosts
#                          that opt in via nodeLabels has-ik-mk2: 'true'.
#   phantom-motion-replay  core stack — motion-replay container of the
#                          phantom-sonic DaemonSet (has-sonic). Web UI
#                          :7865 + ZMQ streamer :5557, clips baked in.
#                          manifest uses foundationbot/phantom-motion-replay
#                          (CI publishes -aarch64 for Jetson). The other
#                          three phantom-sonic containers run
#                          foundationbot/phantom-dma-inference — rewritten
#                          via the 'phantom-locomotion' key above (same
#                          published image; the two workloads are mutually
#                          exclusive so one find-key serves both).
#   okvis2x                core stack — OKVIS2-X live dense-stereo SLAM
#                          DaemonSet (has-okvis gated, default-off). manifest
#                          uses foundationbot/okvis2x. Multi-arch manifest —
#                          the aarch64 image is the Jetson Thor build; OKVIS2-X
#                          CircleCI publishes :<branch> / :latest (and immutable
#                          :<arch>-<version> on release tags).
#   okvis2x-models         core stack — okvis2x's load-models init. manifest
#                          uses foundationbot/okvis2x-models. busybox bundle of
#                          the SLAM model weights (~3.6 GB). Content-addressed +
#                          published by CircleCI's build-models job.
images:
  positronic-control:
    image: localhost:5443/positronic-control:REPLACE-WITH-LOCAL-BUILD-TAG
  phantom-models:
    image: localhost:5443/phantom-models:REPLACE-WITH-MODEL-BUILD-DATE
  operator-ui:
    image: foundationbot/argus.operator-ui:REPLACE-WITH-OPERATOR-UI-COMMIT-SHA
  dma-ethercat:
    image: foundationbot/dma-ethercat:main-latest-aarch64
  # ik-mk2 is default-off (nodeLabels has-ik-mk2: 'false'); uncomment and
  # pin a real CI tag only on hosts that opt in.
  # ik-mk2:
  #   image: foundationbot/ik-mk2:REPLACE-WITH-IK-MK2-BUILD-TAG

# Optional dma-ethercat overrides. After phase 7 installs the .deb,
# bootstrap writes DMA_CONFIG into /etc/dma/dma-ethercat.env so the
# bare-metal dma-ethercat.service picks the right hardware config JSON.
# Resolution order:
#   1. dmaEthercat.configPath  — explicit path, absolute or relative to
#      /usr/share/dma-ethercat/config/. Wins over everything else.
#   2. dmaEthercat.configSet   — directory name under
#      /usr/share/dma-ethercat/config/; bootstrap appends `<robot>.json`.
#   3. auto-detect by robot name, in order:
#        /usr/share/dma-ethercat/config/<robot>.json
#        /usr/share/dma-ethercat/config/<robot>/<robot>.json
#   4. interactive prompt (TTY only) — operator picks from the .json
#      files shipped in the .deb. The selection is persisted back here
#      as configPath so re-bootstraps are non-interactive.
#   5. non-TTY with no match -> bootstrap halts.
#
# Examples:
# dmaEthercat:
#   configPath: test_single_novanta/phantom-0001.json
#   # configSet: test_single_novanta

# CPU isolation. Bootstrap phase 7 carves cpuset partitions out of the
# running kernel, installs a systemd boot service so they reactivate on
# reboot, and (optionally) pins the EtherCAT NIC's IRQs onto an RT core.
# The vendored manage_cpusets.sh (scripts/cpusets/manage_cpusets.sh)
# does the heavy lifting; see docs/cpu-isolation.md for the full
# lifecycle.
#
# Default-on. If this block is absent and bootstrap runs on a TTY, the
# operator is prompted and the answers persist here. Only an explicit
# `enabled: false` skips the phase.
#
# Schema:
#   enabled                  bool, default unset (= phase is a no-op)
#   partitions               list of {name, cpus, description?}
#                              name: alnum/underscore (INI section)
#                              cpus: kernel cpu-list ('10-13', '10,12-14')
#                              partitions cannot overlap on a CPU
#   nic                      optional {iface, irqCore, selector?}
#                              iface:    e.g. ecat0
#                              irqCore:  core for NIC IRQs / NAPI / softirqs
#                                        (must lie inside a partition)
#                              selector: drives phase 7 ecat-interface,
#                                        which renames the NIC adapter to
#                                        iface via udev. Exactly one of:
#                                          mac:    aa:bb:cc:dd:ee:ff
#                                          pci:    "0000:01:00.0"
#                                          driver: igc, index: 0
#                                        Optional — first-bringup operators
#                                        can leave it unset and let the
#                                        vendored interactive picker run.
#                              (legacy alias `rtCore` still accepted with
#                              a deprecation warning).
#   dmaRtCpu                 int, core for the SOEM cyclic loop (becomes
#                              DMA_RT_CPU in /etc/dma/dma-ethercat.env).
#                              SHOULD differ from nic.irqCore: async NIC
#                              interrupts on the same core can preempt
#                              the loop. Validator warns (not errors)
#                              when equal.
#   installAffinityDefaults  bool, default true. Writes
#                              /etc/systemd/system.conf.d/cpuaffinity.conf
#                              with CPUAffinity=<online − partitions − cpu 0>
#                              so systemd-spawned services stay off both
#                              the isolated cores and cpu 0 (which is
#                              dedicated to kernel housekeeping).
#
# Bootstrap phase 8 (under RFC 0004) renders kernel cmdline tokens
# directly: isolcpus=<partitions>, nohz_full=<dmaRtCpu>,
# rcu_nocbs=<partitions>, rcu_nocb_poll, skew_tick=1, irqaffinity=0.
# Reboot required to pick up cmdline changes; bootstrap warns when
# they're written.
#
# cpuIsolation:
#   enabled: true
#   partitions:
#     - {name: ecat, cpus: "11-13", description: "EtherCAT master RT loop"}
#   nic:
#     iface: ecat0
#     irqCore: 13              # NIC IRQs pinned here (one core, isolated)
#     selector:
#       mac: aa:bb:cc:dd:ee:ff # OR pci: "0000:01:00.0"
#                              # OR {driver: igc, index: 0}
#   dmaRtCpu: 11               # SOEM cyclic loop core (nohz_full target)
#   installAffinityDefaults: true

# Per-host phantom-locomotion config. Bootstrap phase locomotion-config
# renders /etc/phantomos/phantom-locomotion-config.yaml from this
# block — a ConfigMap whose keys drive the DaemonSet's dma_launch.sh
# invocation via envFrom: configMapRef:. Same lifecycle as
# operator-ui-pairing: lives on the host (not in git), --reset
# preserves it, ArgoCD doesn't reconcile it.
#
# Two operating modes (FIR-337):
#
#   mode: policy     (default) — runs inference.dma_policy_node with
#                    `policy:` (the trained-policy + joystick stack
#                    the robot uses for normal locomotion).
#
#   mode: diagnostic — runs inference.dma_diagnostic_node (the wire-
#                    integrity diagnostic introduced in
#                    foundationbot/phantom-locomotion#5). The
#                    DaemonSet's container exits when the sweep
#                    completes and then sleeps forever so the operator
#                    can `kubectl cp` the JSON report off the pod.
#                    `policy:` is ignored in this mode.
#
# Default (applied when phantomLocomotion is absent):
#   mode:   policy
#   policy: mk2-walking-lower-body-1imu
#
# Known policies (defined inside the phantom-dma-inference image's
# built-in registry; bootstrap doesn't enumerate them, dma_launch.sh
# fails loud on unknown values):
#   mk2-walking-lower-body         hot-jute,        13 joints, 3 IMUs
#   mk2-walking-lower-body-1imu    aware-motorcar,  13 joints, 1 IMU
#
# diagnostic: subblock fields (all optional; defaults mirror the
# dma_diagnostic_node argparse defaults so a bare `mode: diagnostic`
# with no subblock works). Hard-caps on `bias` (0.30) and `masterGain`
# (1.0) are enforced inside the node, not here.
#
# Complete default set (all fields shown explicitly so future
# maintainers can see the available knobs at a glance — copy-paste
# any subset into your override):
#
#   robot:                mk2-lower-body
#   naming:               mj                    # mj | wire
#   bias:                 0.10                  # rad
#   masterGain:           0.3
#   holdBiasS:            2.0                   # plateau hold (both modes)
#   holdHomeS:            1.0                   # home hold between joints
#   joints:               all
#   outPath:              /recordings/diag_reports/diag_report.json
#   waitForStart:         true
#   jointBiasOverrides:   ""                    # see "Per-joint bias overrides"
#   iterations:           1                     # repeat the sweep N times
#
#   # ── Ramp mode (FIR-342): set rampS>0 to enable. See "Ramp mode" below.
#   rampS:                0.0                   # 0 == step (legacy)
#   returnRampS:          ""                    # "" defaults to rampS
#   velTrackingRatioTol:  0.30                  # ±band for PASS verdict
#   velTrackingLagMaxMs:  60.0                  # LAGGY_VELOCITY warn threshold
#
#   # ── IMU integrity tests (FIR-341). See "IMU integrity tests" below.
#   skipImuTests:         false
#   gravityTol:           0.05                  # static |proj_g_xy| FAIL
#   gravityMagTol:        0.05                  # |proj_g| ±band -> WARN
#   gravityDriftTol:      0.02                  # window-to-window drift
#   imuProjGXyTol:        0.10                  # yaw-invariance FAIL threshold
#   imuPelvisYawTol:      0.30                  # below-spine gyro_z PASS
#   imuQuatDeltaTol:      0.30                  # quat-yaw vs encoder
#   imuGyroNoiseFloor:    0.10                  # active-IMU rise threshold
#   imuIdleGyroTol:       0.30                  # idle-IMU PASS limit
#   imuIdleProjGTol:      0.05                  # idle-IMU proj_g delta limit
#   imuPitchRatioTol:     0.30                  # active proj_g_ratio ±band
#   imuPairDeltaTol:      0.20                  # L/R pair asymmetry threshold
#
#   # ── Chirp test mode (FIR-345). See "Chirp test mode" below.
#   testMode:                 joint-sweep       # joint-sweep | chirp
#   chirpAmplitudeRad:        0.05              # sine-wave amplitude
#   chirpAmplitudeHardCapRad: 0.30              # safety cap on amplitude
#   chirpFreqMinHz:           0.05              # log sweep lower bound
#   chirpFreqMaxHz:           15.0              # log sweep upper bound
#   cycleRateHz:              0.0               # diag loop push rate (Hz); 0 = auto (~50 Hz)
#                                                # set >= 10x chirpFreqMaxHz for chirp fidelity
#   chirpDurationS:           60.0              # per (joint, gain) sweep length
#   chirpEnvelopeS:           0.5               # pre/post-ramp fade-in
#   chirpGainMultipliers:     "0.5,0.7,0.9,1.1,1.3,1.5"   # x masterGain
#   chirpSettleVelTolRadS:    0.02              # settle-quiet velocity tol
#   chirpSettleQuietS:        0.5               # quiet duration before next gain
#   chirpSettleMaxS:          10.0              # FATAL abort if joint won't quiet
#   chirpRrdDir:              /dev/shm          # per-(joint, gain) .rrd output dir
#   chirpAmplitudeOverrides:  ""                # see "Per-joint chirp amplitudes"
#   positionKdMultipliers:    "1.0"             # single rung = no Kd override
#                                                # Bode tuning sweep: "1.0,1.25,1.5,1.75,2.0"
#
# waitForStart: when `true` (default), the diagnostic subscribes to
# /phantom/start_startup (Bool) and blocks until the operator presses
# the joystick X button — same OFF->STARTUP gate as the policy node.
# Set to `false` for headless / CI runs where no joystick is attached
# and the sweep should begin immediately. Maps to the env var
# LOCOMOTION_DIAGNOSTIC_WAIT_FOR_START consumed by dma_launch.sh.
#
# jointBiasOverrides: comma-separated NAME=VALUE list. Each entry is
# forwarded to dma_diagnostic_node as `--joint-bias NAME=VALUE`, which
# overrides the global `bias` for that joint (sign AND magnitude). Use
# when one joint's positive direction would collide with another link
# on the bench fixture, e.g. for mk2 +RightHipRoll moves the right leg
# inward toward the left:
#   jointBiasOverrides: "RightHipRoll=-0.10"
# Default empty (use the global `bias` for every joint). Maps to env
# LOCOMOTION_DIAGNOSTIC_JOINT_BIAS_OVERRIDES. FIR-339.
#
# iterations: repeat the joint sweep N times back-to-back per run.
# Each iteration writes its own timestamped report under outPath's
# directory; the `outPath` itself becomes a symlink to the latest.
# `waitForStart` only fires on iteration 1 — the operator presses X
# once and the rest run consecutively. Default 1. Maps to env
# LOCOMOTION_DIAGNOSTIC_ITERATIONS.
#
# Ramp mode (FIR-342): with `rampS > 0` the diagnostic ramps the
# bias position linearly over `rampS` seconds, holds at the plateau
# for `holdBiasS` seconds (same field used in step mode), then ramps
# back over `returnRampS` (defaults to `rampS` when empty). The
# constant analytic desired velocity during RAMP_UP is
#     desired_v = bias / rampS    (e.g. 0.10 rad / 0.6 s ≈ 0.167 rad/s)
# which lets the analyzer score the actual filtered velocity against
# a known reference. `velTrackingRatioTol = 0.30` means the
# joint PASSes when mean(actual_v)/desired_v lands in [0.7, 1.3].
# `velTrackingLagMaxMs` is warn-only (LAGGY_VELOCITY) — never
# downgrades PASS; the position-side rise verdict already covers
# engagement latency.
# `rampS = 0` (default) keeps the original step-mode behavior
# bit-for-bit; the new vel_tracking_* JSON fields are reported as
# "n/a" in step mode.
# Maps to LOCOMOTION_DIAGNOSTIC_RAMP_S / _RETURN_RAMP_S /
# _VEL_TRACKING_RATIO_BAND_LO + _HI / _VEL_TRACKING_LAG_MAX_MS.
#
# IMU integrity tests (FIR-341): four passive tests run on the IMU
# data already recorded during the joint sweep — no extra motion,
# no state-machine changes. Test A checks `proj_gravity ≈ [0, 0, -1]`
# at home (catches off-axis mounting, wire mismaps). Test B verifies
# yaw invariance during SpineYaw (gold-standard regression for the
# FIR-318 proj_gravity fix). Tests C/D check that the active
# ShinUpperIMU tilts predictably during HipPitch / HipRoll and idle
# IMUs stay still; L/R pair-asymmetry threshold is `imuPairDeltaTol`.
# All thresholds default to the analyzer's built-in values; override
# only if a particular bench fixture's noise floor or mounting
# differs from the design doc. Set `skipImuTests: true` to disable
# all four tests (joint-side verdicts continue running).
# The `Tol` fields (`gravityMagTol`, `imuPitchRatioTol`,
# `velTrackingRatioTol`) each expand to a (LO, HI) env-var pair
# consumed by dma_launch.sh: lo = 1 - tol, hi = 1 + tol.
#
# Chirp test mode (FIR-345): when `testMode: chirp`, the diagnostic
# stops doing the per-joint step/ramp sweep and instead drives each
# joint with a log-frequency sine wave (chirpFreqMinHz → chirpFreqMaxHz
# over chirpDurationS) at a ladder of masterGain multipliers
# (chirpGainMultipliers). Per (joint, gain) the runner writes a .rrd
# under chirpRrdDir that the operator post-processes with
# `phantom-locomotion/scripts/tools/chirp_to_bode.py` to get Bode plots
# + a stability/bandwidth recommendation via `recommend_gain.py`.
# Total runtime ≈ N_joints × N_gains × (chirpDurationS + chirpEnvelopeS
# + settle), which is ≈ 80-90 min at defaults across all 13 mk2-lower-
# body joints; subset via `joints:` while characterising one fixture.
# Between gain steps the runner waits for the joint to mechanically
# quiet (|v| < chirpSettleVelTolRadS for chirpSettleQuietS continuous
# seconds); if it can't quiet within chirpSettleMaxS the entire sweep
# aborts FATALLY — that joint just went unstable at the previous gain
# and continuing would risk the actuator. Inspect the .rrd from the
# unstable step before re-running.
# All chirp* fields are inert when testMode is `joint-sweep` (default).
# Requires master-side dma-main clamp raised to 2.0 (FIR-348) for
# multipliers > 1.0 to take effect.
#
# Control-loop rate (`cycleRateHz`): the diagnostic pushes desired
# commands at this rate. 0 (default) derives it from the observed
# /actuals dt, which lands at ~50 Hz — fine for joint-sweep but it
# UNDERSAMPLES the chirp (a 15 Hz sweep at 50 Hz is past Nyquist). For
# chirp runs set it explicitly to >= ~10x chirpFreqMaxHz (e.g. 200); the
# effective rate is capped by the /actuals publish rate (~500 Hz).
# Applies to both testMode values.
#
# Per-joint chirp amplitudes (`chirpAmplitudeOverrides`): comma-
# separated NAME=VALUE list, parallel in shape to `jointBiasOverrides`.
# Each entry overrides the global `chirpAmplitudeRad` for that joint
# so a high-gearbox joint (e.g. SpineYaw) sees a mechanically-
# comparable command amplitude to a low-gearbox one (e.g. HipPitch).
# The canonical 1/gear_ratio table lives in phantom-locomotion at
#   docs/diagnostics/chirp_amplitudes_mk2_lower_body.json
# — bench operators paste the full mk2-lower-body block from that
# file straight into this field. Default empty (use the global
# `chirpAmplitudeRad` for every joint). Chirp-mode-only — inert when
# `testMode: joint-sweep`. Maps to env
# LOCOMOTION_DIAGNOSTIC_CHIRP_AMPLITUDE_OVERRIDES; omit-if-empty so a
# bare diagnostic config doesn't ship a blank env var.
#
# Position-Kd ladder (`positionKdMultipliers`): CSV ladder of
# multipliers applied to baseline `position_kd` per drive. Default
# "1.0" — single rung, no Kd override, single chirp pass; matches
# pre-FIR-345 chirp behaviour for back-compat. For the Bode-tuning
# sweep that brackets nominal Kd, operators set the full ladder:
#   positionKdMultipliers: "1.0,1.25,1.5,1.75,2.0"
# When more than one value is given, the chirp test repeats the full
# joint sweep at each Kd multiplier rung, multiplying total runtime
# by len(rungs) — at 5 rungs × 13 joints × 30 s chirp + settle, plan
# for ~45 min of bench time. Chirp-mode-only — inert when
# `testMode: joint-sweep`. Maps to env
# LOCOMOTION_DIAGNOSTIC_POSITION_KD_MULTIPLIERS.
#
# The default outPath lives on the DaemonSet's /recordings hostPath
# mount (host /root/recordings, same path dma-recorder writes .rrd
# files to). Reports survive pod restarts and are reachable from the
# host's /root/recordings/diag_reports/ directory; operators can
# `kubectl cp` the symlink (always the latest run) without knowing
# the per-iteration timestamp. Override to /dev/shm/diag_report.json
# on a dev pod that lacks the /recordings mount.
#
# Example — normal locomotion (default):
# phantomLocomotion:
#   policy: mk2-walking-lower-body-1imu
#
# Example — wire-integrity sweep with RightHipRoll commanded inward
# so the right leg doesn't collide with the left (step mode):
# phantomLocomotion:
#   mode: diagnostic
#   policy: mk2-walking-lower-body-1imu   # ignored when mode==diagnostic
#   diagnostic:
#     naming: mj
#     bias: 0.10
#     masterGain: 0.3
#     holdBiasS: 2.0
#     holdHomeS: 1.0
#     outPath: /recordings/diag_reports/diag_report.json
#     waitForStart: true
#     jointBiasOverrides: "RightHipRoll=-0.10"
#
# Example — ramped command + velocity tracking + IMU tests, repeated
# 5 times for noise averaging (recommended modern profile):
# phantomLocomotion:
#   mode: diagnostic
#   diagnostic:
#     bias: 0.10
#     rampS: 0.6                          # 0.10 / 0.6 ≈ 0.167 rad/s desired
#     holdBiasS: 0.5                      # shorter plateau OK in ramp mode
#     iterations: 5
#     jointBiasOverrides: "RightHipRoll=-0.10"
#
# Example — quick chirp validation on one joint, one gain (~15 s on the
# bench). Use this to validate the chirp toolchain end-to-end before
# committing to the ~80-min full sweep.
# phantomLocomotion:
#   mode: diagnostic
#   diagnostic:
#     testMode: chirp
#     masterGain: 0.3                     # nominal; multipliers scale this
#     joints: SpineYaw
#     chirpDurationS: 10                  # short sweep for smoke test
#     chirpGainMultipliers: "1.0"         # single gain — bypass the ladder
#     chirpRrdDir: /recordings/chirp      # .rrd files survive pod restarts
#
# Example — full chirp/bode sweep across all joints + default gain
# ladder. Plan for ~80-90 min runtime; the launcher exits when done
# and the operator pulls the .rrd files off via `kubectl cp` before
# running chirp_to_bode.py + recommend_gain.py locally.
# phantomLocomotion:
#   mode: diagnostic
#   diagnostic:
#     testMode: chirp
#     masterGain: 0.3
#     chirpRrdDir: /recordings/chirp
#     # everything else defaults: full 13-joint sweep at 0.5,0.7,...,1.5×
#
# Example — chirp test sweeping per-joint amplitudes (1/gear_ratio) across
# the recommended positionKd ladder. Bench operators paste the
# chirpAmplitudeOverrides values from phantom-locomotion's static
# reference JSON (docs/diagnostics/chirp_amplitudes_mk2_lower_body.json)
# so each joint sees a mechanically-comparable command amplitude.
# positionKdMultipliers is set explicitly to the 5-rung sweep — the
# host-config default is "1.0" (single rung, no Kd override) so existing
# chirp deployments are unaffected; opt in to the ladder per-test.
# The 5-rung ladder repeats the full joint sweep at each rung — expect
# roughly 5× the single-pass runtime; subset `joints:` or shorten the
# ladder for a quicker characterisation pass.
# phantomLocomotion:
#   mode: diagnostic
#   diagnostic:
#     testMode: chirp
#     chirpAmplitudeOverrides: "SpineYaw=0.04388,LeftHipPitch=0.06794, ..."
#     positionKdMultipliers: "1.0,1.25,1.5,1.75,2.0"
#     masterGain: 1.0
#     joints: all
#     chirpRrdDir: /recordings/chirp
#
# Example — host /data2 partition holds recordings instead of the
# default /root/recordings. The phantom-locomotion DaemonSet's base
# manifest declares the recordings mount with `path: /root/recordings`;
# the strategic-merge patch below redirects ONLY that named volume,
# leaving shm / dev-input / policies untouched:
# deployments:
#   phantom-locomotion:
#     mounts:
#       - {name: recordings, host: /data2/recordings, container: /recordings}

# Per-host phantom-sonic config (the MK1 Walking ↔ SONIC stack, gated on
# foundation.bot/has-sonic). Bootstrap phase sonic-config renders
# /etc/phantomos/phantom-sonic-config.yaml from this block — a ConfigMap
# the four phantom-sonic containers consume via envFrom. Same host-resident,
# ArgoCD-unmanaged, --reset-preserved lifecycle as phantomLocomotion.
#
# Every field is optional; omitted fields fall back to the defaults below
# (which match AI/1134854145 and the manifest's shell-defaults), so an
# absent phantomSonic block still renders a working ConfigMap.
#
# Defaults:
#   rosDomainId:    "43"                  # ROS_DOMAIN_ID (control + walking)
#   walkingPolicy:  mk1-walking-1imu-1    # SONIC_WALKING_POLICY (dma_launch.sh)
#   encoderMode:    "0"                   # SONIC_ENCODER_MODE (sonic --encoder-mode)
#   motionZmqPort:  "5557"                # MOTION_ZMQ_PORT (sonic + motion-replay)
#   controlZmqPort: "5558"                # CONTROL_ZMQ_PORT (sonic --control-zmq)
#   webPort:        "7865"                # WEB_PORT (motion-replay UI)
#   motionRampSecs: "1.0"                 # MOTION_RAMP_SECS (motion-replay)
#
# Example — bump the ROS domain and serve the web UI on a custom port:
# phantomSonic:
#   rosDomainId: "44"
#   webPort: "8080"

# Log retention caps. Bootstrap phase log-management writes drop-ins
# under /etc/systemd/journald.conf.d/ and /etc/logrotate.d/ to keep
# /var/log/journal and /var/log/syslog from filling the root partition.
# Drop-in style: the upstream /etc/systemd/journald.conf and
# /etc/logrotate.d/rsyslog are left untouched, so dpkg upgrades don't
# trigger 'modified config' prompts.
#
# Defaults (applied when the block is absent or has empty children):
#   journald.systemMaxUse:      2G       # cap on /var/log/journal/ total
#   journald.systemMaxFileSize: 100M     # rotate per-file at this size
#   rsyslog.maxsize:            500M     # logrotate maxsize directive
#   rsyslog.rotate:             7        # how many rotated files to keep
#   rsyslog.frequency:          daily    # daily | weekly
#   rsyslog.compress:           true     # gzip rotated files
#
# Defaults are opt-out, not opt-in: a 793 GB /var/log/syslog has filled
# robots in the field. Set logManagement.enabled: false to suppress
# the phase and remove any prior phantomos-* drop-ins.
#
# logManagement:
#   enabled: true
#   journald:
#     systemMaxUse: 2G
#     systemMaxFileSize: 100M
#   rsyslog:
#     maxsize: 500M
#     rotate: 7
#     frequency: daily
#     compress: true

# Per-host node labels. Bootstrap applies these to the k8s Node
# object so Deployments / DaemonSets gating on nodeSelector can target
# subsets of the fleet.
#
# Bootstrap manages the foundation.bot/ prefix as a CLOSED SET: every
# label in this block is applied; any label on the node under the same
# prefix that's NOT in this block gets removed on the next bootstrap
# re-run. Labels outside foundation.bot/ are not touched (k8s built-ins,
# k0s built-ins, ad-hoc operator labels are all safe).
#
# Reserved: foundation.bot/robot is applied unconditionally as 'true'
# by the cluster phase. The validator rejects any attempt to set or
# override it via this block.
#
# Mutual exclusion: positronic-control, phantom-locomotion, and
# phantom-sonic each drive /desired, so at most ONE may be 'true' per
# robot. positronic defaults to on, so enabling has-locomotion OR
# has-sonic requires foundation.bot/has-positronic: 'false' (the
# validator rejects the conflict with a pointed error).
#
# Values must be strings — quote 'true' / 'false' or the YAML parser
# turns them into Python booleans, which the validator rejects with
# a clear error.
#
# Registry of known gates: scripts/lib/host-config.py:NODE_LABEL_REGISTRY.
# configure-host.sh emits this block automatically with all known keys
# populated to their defaults. Hand-editing is fine; the wizard
# preserves your values on the next re-run.
nodeLabels:
  # Gates per-robot workloads via Kubernetes nodeSelectors. Bootstrap
  # reconciles the node's foundation.bot/* labels from this block on
  # every run. Edit a value to (de)schedule the workload on this host.
  # dma-video stack (mediamtx, camera-params, rtsp-streamer, producer, viewer)
  foundation.bot/has-cameras: 'true'
  # phantom-locomotion DaemonSet (mutually exclusive with has-positronic)
  foundation.bot/has-locomotion: 'false'
  # okvis2x DaemonSet (OKVIS2-X live dense-stereo SLAM; GPU + DMA shm)
  foundation.bot/has-okvis: 'false'
  # positronic-control Deployment
  foundation.bot/has-positronic: 'true'
  # phantom-sonic DaemonSet (Walking+SONIC; mutually exclusive with
  # has-locomotion and has-positronic)
  foundation.bot/has-sonic: 'false'
  # dma-recorder DaemonSet (dma-streams)
  foundation.bot/has-recorder: 'true'
  # cpp-robot-state-estimator DaemonSet
  foundation.bot/has-state-estimator: 'false'
  # rerun-streamer Deployment (dma-streams)
  foundation.bot/has-streamer: 'false'
  # yovariable-server DaemonSet
  foundation.bot/has-yovariable: 'true'

# Per-host hostPath mounts injected into specific Deployments at
# bootstrap time. The base manifests in this repo carry only universal
# kernel/runtime mounts (/dev, /dev/shm, /tmp); EVERY OTHER host path
# (data partitions, source checkout, recordings, torch cache) lives
# here. Bootstrap renders these as strategic-merge patches on the
# matching stack's Argo Application via spec.source.kustomize.patches;
# ArgoCD will not revert them. Leaving a key out reverts the
# corresponding Deployment to its bare base on the next bootstrap.
#
# Rules:
#   - Paths must be ABSOLUTE. '~' is rejected (bootstrap runs as root).
#   - privileged: true grants /dev passthrough — only enable on dev
#     machines you control. Bootstrap warns loudly when you do.
#
# Known deployment keys (others are rejected):
#   positronic-control     core stack, container 'positronic-control'
#                                       (also accepts launchCommand — see below)
#   phantomos-api-server   core stack, container 'api'
#   phantom-locomotion     core stack, container 'phantom-locomotion'
#                                       (default /recordings mount, override host path here)
#   cpp-robot-state-estimator
#                          core stack, container 'state-estimator'
#                                       (accepts extraArgs — see below)
#   dma-recorder           core stack, container 'recorder' (DMA.streams .rrd writer)
#   rerun-streamer         core stack, container 'streamer' (DMA.streams live viewer)
#   okvis2x                core stack, container 'okvis2x' (OKVIS2-X SLAM)
#                                       (accepts extraArgs — full argv replace, see below)
#
# deployments.okvis2x.extraArgs (optional):
#   okvis2x's argv is POSITIONAL (<app> <okvis.yaml> <se2.yaml> <output>), so
#   extraArgs REPLACES the container argv wholesale rather than appending — the
#   first element is the app (dma_live | snetwork). Omit it to keep the baked
#   Thor foundation_rig config the base manifest ships. Camera calibration is
#   per-robot, so the common pattern is to mount host YAMLs at /etc/okvis and
#   repoint argv at them:
#
#     deployments:
#       okvis2x:
#         mounts:
#           # per-robot okvis + se2 YAMLs (calibration differs per robot)
#           - {name: okvis-config, host: /etc/phantomos/okvis, container: /etc/okvis}
#           # persist trajectories/meshes (default /output is an ephemeral emptyDir)
#           - {name: output,       host: /data/okvis,          container: /output}
#         extraArgs: [dma_live, /etc/okvis/okvis_stereo_dense_thor.yaml,
#                     /etc/okvis/se2.yaml, /output]
#
#   snetwork (dataset replay) instead of live SLAM — argv is
#   [snetwork, <okvis.yaml>, <se2.yaml>, <dataset-dir>, <output-dir>]; add a
#   mount for the dataset dir alongside.
#
# deployments.cpp-robot-state-estimator.extraArgs (optional):
#   List of additional CLI flags appended after the SE's base args. Use
#   when a per-robot hardware configuration differs from the default SE
#   flag set — for example, robots without F/T sensors (e.g. mk11000009)
#   whose contact source diverges from the default ft_sensors source:
#
#     deployments:
#       cpp-robot-state-estimator:
#         extraArgs: [--foot-contact-source, kinematic]
#
#   Strategic-merge replaces the args list wholesale (Kubernetes cannot
#   merge a list of scalars), so the full base args are always re-emitted
#   before the extraArgs. Do not repeat base flags here — just the new
#   ones. Only supported on cpp-robot-state-estimator; the validator
#   rejects this field on other deployments.
#
# deployments.positronic-control.launchCommand (optional):
#   The command the positronic-control pod's entrypoint runs (exec'd via
#   PHANTOM_CMD env). When unset, the pod runs `sleep infinity` (interactive
#   dev mode). The value flows into a strategic-merge patch on the
#   positronic-config ConfigMap (data.PHANTOM_CMD), injected into the
#   core Argo Application's spec.source.kustomize.patches by
#   bootstrap-robot.sh phase 12 (image-overrides) and phase 13
#   (deployments). This makes PHANTOM_CMD declarative — every Argo sync
#   re-applies it, so the value survives `kubectl apply -k` cycles, pod
#   rolls, and operator-side ConfigMap edits.
#
#   `positronic.sh set-cmd <cmd>` is durable by default (FIR-408): it
#   edits this field + re-runs bootstrap. Pass --transient for the legacy
#   one-off kubectl-patch behavior. See docs/internal/phantom-cmd-persistence.md.
#
# deployments:
#   positronic-control:
#     privileged: false
#     launchCommand: "ros2 launch phantom_policies dma_policy_launch.py policy_path:=/root/models/walking-imu-hard-railing"
#     mounts:
#       # Production-canonical paths (every robot)
#       - {name: data,        host: /data,                container: /data}
#       - {name: data2,       host: /data2,               container: /data2}
#       - {name: recordings,  host: /root/recordings,     container: /recordings}
#       - {name: torch-hub,   host: /data/torch,          container: /root/.cache/torch/hub}
#       # Developer-only (uncomment on dev hosts)
#       - {name: src,         host: /home/<user>/development/foundation/positronic_control,
#                             container: /src}
#       - {name: ihmc-config, host: /home/<user>/development/foundation/positronic_control/workspace/.ihmc,
#                             container: /root/.ihmc}
#       - {name: trainground, host: /home/<user>/trainground, container: /trainground}
#
#   phantomos-api-server:
#     mounts:
#       # The base manifest already bind-mounts host /root/models to
#       # the api server's expected in-pod path (/home/operator/models).
#       # Don't redeclare that here — only add extra paths the api
#       # server needs.
#       - {name: operator-ui-repo, host: /opt/argus/operator_ui,
#                                  container: /home/operator/repos/argus/operator_ui}
#       - {name: phantom-scripts,  host: /opt/phantom/scripts,
#                                  container: /opt/phantom/scripts}
#
#   # phantom-locomotion: the base manifest ships a default recordings
#   # mount (host /root/recordings → container /recordings) shared with
#   # dma-recorder. ONLY override on robots whose recordings live on a
#   # different partition — listing only the named entries you want to
#   # change keeps shm / dev-input / policies as the base declares them.
#   phantom-locomotion:
#     mounts:
#       - {name: recordings, host: /data2/recordings, container: /recordings}
#
#   # variant: mk1 | mk2 | mk2_lowerbody — picks the bundled URDF for
#   # the DMA.streams workloads. Supported on:
#   #   - rerun-streamer: live viewer auto-loads
#   #     /usr/local/share/dma-streams/urdf/phantom_<variant>.urdf
#   #   - dma-recorder:   embeds the same URDF + meshes into each .rrd
#   #     so the file is self-contained when opened off-robot.
#   # All URDFs are baked into the image — purely an argv override, no
#   # mount needed. Use mk2_lowerbody on robots with only the
#   # locomotion chain populated (no Neck/Spine/Arms). Set on every
#   # mk2 host:
#   dma-recorder:
#     variant: mk2
#     # explodeJoints: opt in to per-joint addressable Rerun entity
#     # paths under /joints/<quantity>/<category>/<JointName> (in
#     # addition to the bundled length-N Scalars entities). Lets you
#     # drag a single joint into its own viewer panel and pair actual
#     # vs desired without bringing along the other 12. Storage grows
#     # a few MB per joint per minute of recording. Default: omitted
#     # (bundled-only, byte-identical to past recordings).
#     #   explodeJoints: [RightAnklePitch, LeftAnklePitch]
#     # Sentinel ["all"] splits every real joint (1.5-2x file size):
#     #   explodeJoints: [all]
#     # See FIR-329 in foundationbot/DMA.streams.
#   rerun-streamer:
#     variant: mk2
#     # queueMemoryLimitMb: integer MB cap on the streamer's in-process
#     # AsyncLogQueue. Past the cap, oldest entries are dropped — the
#     # OOM-prevention knob. Default (set in the base manifest) is 8.
#     # Raise only if frame loss during transient viewer stalls is a
#     # bigger problem than RSS growth.
#     queueMemoryLimitMb: 8
#
#   # cpp-robot-state-estimator: on robots without F/T sensors (0-F/T
#   # hardware like mk11000009), the default ft_sensors contact source
#   # disagrees with the missing hardware — use kinematic instead:
#   cpp-robot-state-estimator:
#     extraArgs: [--foot-contact-source, kinematic]
#   # dma-bridge: the FE WebSocket bridge (:9098) over /dev/shm. Default-on
#   # (foundation.bot/has-dma-bridge); take it off a host by setting that
#   # label to 'false' in nodeLabels: below. The base manifest mounts only
#   # /dev/shm — the bridge's PYTHONPATH sibling repos are per-host and MUST
#   # be supplied here for it to import phantom_runtime / ai_inference /
#   # phantom_policies. host = the on-robot checkout paths (mirror whatever
#   # positronic-control's `src` mount uses on this host).
#   dma-bridge:
#     privileged: true
#     mounts:
#       - {name: src,          host: /opt/positronic_control, container: /src}
#       - {name: ai-inference, host: /opt/ai.inference,       container: /ai.inference}
