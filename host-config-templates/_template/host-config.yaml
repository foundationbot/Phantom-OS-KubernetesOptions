# Generic per-host configuration template.
#
# Copy to /etc/phantomos/host-config.yaml (or pass to bootstrap with
# `--host-config`) and replace placeholder values. This is the single
# source-of-truth for per-host config — bootstrap derives the rendered
# Argo Application CRs (one per stack), the operator-ui-pairing
# ConfigMap, and the persisted robot-id file from this single file.

# Robot identity. DNS-1123: lowercase alphanumeric + hyphens, 1..63
# chars, bookended by alphanumeric. Used in Argo Application names
# (phantomos-<robot>-core, phantomos-<robot>-operator, ...).
robot: REPLACE-WITH-ROBOT-NAME

# Tailscale URL of the AI PC paired with this robot. Bootstrap renders
# /etc/phantomos/operator-ui-pairing.yaml from this value.
aiPcUrl: http://REPLACE-WITH-AI-PC-TAILSCALE-IP:5000

# Optional. Branch / tag / SHA the per-host ArgoCD Applications should
# track. Bootstrap substitutes this into every rendered Application CR
# at bringup. Default: main.
targetRevision: main

# Optional. Global production mode. When true, ArgoCD auto-reverts
# manual cluster edits (selfHeal: true) on every stack that doesn't
# override it under stacks.<name>.selfHeal. When false (default), drift
# is reported but not corrected — useful for dev/debug machines where
# on-call might `kubectl edit` resources during incidents.
# CLI override: --production / --no-production.
production: false

# Stack toggles + per-stack selfHeal overrides.
#
#   stacks.core      always required; cannot be disabled.
#   stacks.operator  argus + nimbus (operator UI, episode storage).
#                    Toggle the whole group with enabled: false.
#
# Each stack's selfHeal: field is optional. When set, it overrides the
# top-level production: flag for that stack only — useful when you want
# the robot in production mode but the operator UI tolerant of manual
# debugging, or vice-versa.
stacks:
  core:
    # selfHeal: true        # uncomment to override production:
  operator:
    enabled: true
    # selfHeal: false       # uncomment to leave drift alone

# Per-host image overrides. Container-keyed: each entry names a known
# container and supplies the full image ref (repo:tag) it should run.
# Bootstrap looks up the container in CONTAINER_TARGETS
# (scripts/lib/host-config.py) to find the image reference the BASE
# manifest currently uses, then injects a kustomize.images entry that
# rewrites every reference to that image in the rendered manifests.
#
#   - if your `image:` keeps the same repo as the base manifest, only
#     the tag changes (typical for a local-registry build).
#   - if your `image:` swaps the repo (e.g. localhost:5443/positronic-control
#     -> foundationbot/phantom-cuda), bootstrap emits a
#     "<base>=<your-image>" kustomize entry that renames AND retags in
#     one step. No special host-config field needed — just write the
#     full ref you want.
#
# Known containers (others are rejected at validate-time):
#   positronic-control   core stack — manifest uses
#                          localhost:5443/positronic-control
#   phantom-models       core stack — manifest uses
#                          localhost:5443/phantom-models
#   operator-ui          operator stack — manifest uses
#                          foundationbot/argus.operator-ui
#   dma-ethercat         NOT stack-routed — bootstrap-managed installer
#                          Job. Phase 9 reads images.dma-ethercat.image
#                          directly. Tag convention:
#                            *-latest-aarch64  Jetson / arm64 robots
#                            *-latest-amd64    x86 robots
images:
  positronic-control:
    image: localhost:5443/positronic-control:REPLACE-WITH-LOCAL-BUILD-TAG
  phantom-models:
    image: localhost:5443/phantom-models:REPLACE-WITH-MODEL-BUILD-DATE
  operator-ui:
    image: foundationbot/argus.operator-ui:REPLACE-WITH-OPERATOR-UI-COMMIT-SHA
  dma-ethercat:
    image: foundationbot/dma-ethercat:main-latest-aarch64

# Optional dma-ethercat overrides. After phase 7 installs the .deb,
# bootstrap writes DMA_CONFIG into /etc/dma/dma-ethercat.env so the
# bare-metal dma-ethercat.service picks the right hardware config JSON.
# Resolution order:
#   1. dmaEthercat.configPath  — explicit path, absolute or relative to
#      /usr/share/dma-ethercat/config/. Wins over everything else.
#   2. dmaEthercat.configSet   — directory name under
#      /usr/share/dma-ethercat/config/; bootstrap appends `<robot>.json`.
#   3. auto-detect by robot name, in order:
#        /usr/share/dma-ethercat/config/<robot>.json
#        /usr/share/dma-ethercat/config/<robot>/<robot>.json
#   4. interactive prompt (TTY only) — operator picks from the .json
#      files shipped in the .deb. The selection is persisted back here
#      as configPath so re-bootstraps are non-interactive.
#   5. non-TTY with no match -> bootstrap halts.
#
# Examples:
# dmaEthercat:
#   configPath: test_single_novanta/phantom-0001.json
#   # configSet: test_single_novanta

# CPU isolation. Bootstrap phase 7 carves cpuset partitions out of the
# running kernel, installs a systemd boot service so they reactivate on
# reboot, and (optionally) pins the EtherCAT NIC's IRQs onto an RT core.
# The vendored manage_cpusets.sh (scripts/cpusets/manage_cpusets.sh)
# does the heavy lifting; see docs/cpu-isolation.md for the full
# lifecycle.
#
# Default-on. If this block is absent and bootstrap runs on a TTY, the
# operator is prompted and the answers persist here. Only an explicit
# `enabled: false` skips the phase.
#
# Schema:
#   enabled                  bool, default unset (= phase is a no-op)
#   partitions               list of {name, cpus, description?}
#                              name: alnum/underscore (INI section)
#                              cpus: kernel cpu-list ('10-13', '10,12-14')
#                              partitions cannot overlap on a CPU
#   nic                      optional {iface, irqCore, selector?}
#                              iface:    e.g. ecat0
#                              irqCore:  core for NIC IRQs / NAPI / softirqs
#                                        (must lie inside a partition)
#                              selector: drives phase 7 ecat-interface,
#                                        which renames the NIC adapter to
#                                        iface via udev. Exactly one of:
#                                          mac:    aa:bb:cc:dd:ee:ff
#                                          pci:    "0000:01:00.0"
#                                          driver: igc, index: 0
#                                        Optional — first-bringup operators
#                                        can leave it unset and let the
#                                        vendored interactive picker run.
#                              (legacy alias `rtCore` still accepted with
#                              a deprecation warning).
#   dmaRtCpu                 int, core for the SOEM cyclic loop (becomes
#                              DMA_RT_CPU in /etc/dma/dma-ethercat.env).
#                              SHOULD differ from nic.irqCore: async NIC
#                              interrupts on the same core can preempt
#                              the loop. Validator warns (not errors)
#                              when equal.
#   installAffinityDefaults  bool, default true. Writes
#                              /etc/systemd/system.conf.d/cpuaffinity.conf
#                              with CPUAffinity=<online − partitions − cpu 0>
#                              so systemd-spawned services stay off both
#                              the isolated cores and cpu 0 (which is
#                              dedicated to kernel housekeeping).
#
# Bootstrap phase 8 (under RFC 0004) renders kernel cmdline tokens
# directly: isolcpus=<partitions>, nohz_full=<dmaRtCpu>,
# rcu_nocbs=<partitions>, rcu_nocb_poll, skew_tick=1, irqaffinity=0.
# Reboot required to pick up cmdline changes; bootstrap warns when
# they're written.
#
# cpuIsolation:
#   enabled: true
#   partitions:
#     - {name: ecat, cpus: "11-13", description: "EtherCAT master RT loop"}
#   nic:
#     iface: ecat0
#     irqCore: 13              # NIC IRQs pinned here (one core, isolated)
#     selector:
#       mac: aa:bb:cc:dd:ee:ff # OR pci: "0000:01:00.0"
#                              # OR {driver: igc, index: 0}
#   dmaRtCpu: 11               # SOEM cyclic loop core (nohz_full target)
#   installAffinityDefaults: true

# Per-host hostPath mounts injected into specific Deployments at
# bootstrap time. The base manifests in this repo carry only universal
# kernel/runtime mounts (/dev, /dev/shm, /tmp); EVERY OTHER host path
# (data partitions, source checkout, recordings, torch cache) lives
# here. Bootstrap renders these as strategic-merge patches on the
# matching stack's Argo Application via spec.source.kustomize.patches;
# ArgoCD will not revert them. Leaving a key out reverts the
# corresponding Deployment to its bare base on the next bootstrap.
#
# Rules:
#   - Paths must be ABSOLUTE. '~' is rejected (bootstrap runs as root).
#   - privileged: true grants /dev passthrough — only enable on dev
#     machines you control. Bootstrap warns loudly when you do.
#
# Known deployment keys (others are rejected):
#   positronic-control     core stack, container 'positronic-control'
#   phantomos-api-server   core stack, container 'api'
#
# deployments:
#   positronic-control:
#     privileged: false
#     mounts:
#       # Production-canonical paths (every robot)
#       - {name: data,        host: /data,                container: /data}
#       - {name: data2,       host: /data2,               container: /data2}
#       - {name: recordings,  host: /root/recordings,     container: /recordings}
#       - {name: torch-hub,   host: /data/torch,          container: /root/.cache/torch/hub}
#       # Developer-only (uncomment on dev hosts)
#       - {name: src,         host: /home/<user>/development/foundation/positronic_control,
#                             container: /src}
#       - {name: ihmc-config, host: /home/<user>/development/foundation/positronic_control/workspace/.ihmc,
#                             container: /root/.ihmc}
#       - {name: trainground, host: /home/<user>/trainground, container: /trainground}
#
#   phantomos-api-server:
#     mounts:
#       - {name: operator-ui-repo, host: /opt/argus/operator_ui,
#                                  container: /home/operator/repos/argus/operator_ui}
#       - {name: phantom-scripts,  host: /opt/phantom/scripts,
#                                  container: /opt/phantom/scripts}
