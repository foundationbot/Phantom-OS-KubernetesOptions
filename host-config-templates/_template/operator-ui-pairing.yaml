# Generic operator-ui pairing template.
#
# This ConfigMap holds a SINGLE per-robot value: the Tailscale host
# (IP or FQDN) of the AI PC paired with this robot. The operator-ui
# and vr-web Deployments compose every URL they need from it via
# Kubernetes env-var substitution ($(VAR_NAME)):
#
#   operator-ui  AI_PC_URL          http://$(AI_PC_HOST):5000
#   vr-web       CAMERA_SERVER_URL  http://$(AI_PC_HOST):8889
#   vr-web       ROSBRIDGE_URL      ws://$(AI_PC_HOST):9090
#
# So a robot move (new AI PC) is a single-line change here — every
# downstream URL re-renders automatically on the next pod start.
#
# Copy to /etc/phantomos/operator-ui-pairing.yaml and replace
# REPLACE-WITH-AI-PC-TAILSCALE-IP. bootstrap-robot.sh --ai-pc-url <url>
# writes this file for you (extracting the host portion of the URL).
#
# The vr-web Pod also needs a TLS cert (WebXR requires HTTPS). That's a
# separate per-host artefact, not part of this ConfigMap:
#
#   sudo tailscale cert <robot>.<tailnet>.ts.net
#   sudo mkdir -p /etc/phantomos/vr-web-tls
#   sudo install -m 0644 <fqdn>.crt /etc/phantomos/vr-web-tls/cert.crt
#   sudo install -m 0600 <fqdn>.key /etc/phantomos/vr-web-tls/cert.key
#   sudo bash scripts/bootstrap-robot.sh --operator-ui-config
#
# Phase 6 picks the cert files up and applies kubernetes.io/tls Secret
# argus/vr-web-tls. ArgoCD does NOT manage that Secret — same lifecycle
# as this ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: operator-ui-pairing
  namespace: argus
data:
  AI_PC_HOST: REPLACE-WITH-AI-PC-TAILSCALE-IP
