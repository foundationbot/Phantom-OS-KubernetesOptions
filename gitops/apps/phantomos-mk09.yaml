apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: phantomos-mk09
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/foundationbot/Phantom-OS-KubernetesOptions.git
    targetRevision: feat/local-registry-mirror
    path: manifests/robots/mk09
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
