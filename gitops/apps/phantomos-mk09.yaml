apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: phantomos-mk09
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/foundationbot/Phantom-OS-KubernetesOptions.git
    targetRevision: main
    path: manifests/robots/mk09
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  # Don't reconcile fields populated by the binding controller. Without
  # this, ArgoCD strips the runtime-added claimRef.uid back to whatever
  # the manifest declares (which is just name+namespace), and the bound
  # PVC eventually drops to status.phase: Lost — exactly the failure
  # mode that hit mongodb + redis on 2026-04-26.
  ignoreDifferences:
    - group: ""
      kind: PersistentVolume
      jsonPointers:
        - /spec/claimRef/uid
        - /spec/claimRef/resourceVersion
        - /spec/claimRef/apiVersion
        - /spec/claimRef/kind
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/volumeName
        - /metadata/annotations/pv.kubernetes.io~1bind-completed
        - /metadata/annotations/pv.kubernetes.io~1bound-by-controller
