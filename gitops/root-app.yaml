# Root "app-of-apps" — one Application that manages every other Application CR
# in gitops/apps/. Apply this file ONCE via kubectl. From then on, any file
# added to gitops/apps/ becomes a live ArgoCD Application without further
# manual work; deleting a file removes the child Application (and its workload).
#
# This is the one manual-apply that bootstraps the entire GitOps loop.
# In session E, Terraform will apply this root-app.yaml so even that step
# becomes declarative.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  # Prevent ArgoCD from pruning itself if the root is ever out of sync
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/foundationbot/Phantom-OS-KubernetesOptions.git
    targetRevision: main
    path: gitops/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true      # remove a child Application when its yaml is deleted from gitops/apps/
      selfHeal: false
    syncOptions:
      - ApplyOutOfSyncOnly=true
  # Per-host bootstrap injects image-tag overrides AND (in dev mode)
  # hostPath mount patches into each child Application's
  # spec.source.kustomize.{images,patches} at bringup
  # (see scripts/bootstrap-robot.sh + /etc/phantomos/host-config.yaml).
  # The git tree carries neither, so without these entries the root
  # would clobber the host-injected lists on every reconcile.
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /spec/source/kustomize/images
        - /spec/source/kustomize/patches
